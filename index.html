      overscroll-behavior: none;

      position: fixed;
      inset: 0;
      display: block;
      min-height: 0;
      padding: 0;
    }
    #game-shell {
      position: absolute;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      width: auto;
      height: auto;

      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;

      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

  const SKILL_KEYS = Object.keys(SKILL_DEFS);
  const INITIAL_SKILL_ORDERS = {
    a1: ["water_bullet", "fireball_spell", "thorn_incantation", "wind_breath_bolt", "flame_ring", "healing_spell", "water_dragon", "stone_chief"],
    a2: ["wind_breath_bolt", "wind_god_feather", "tornado", "ice_cone", "water_bullet", "fireball_spell", "healing_spell"],

    a4: ["water_dragon", "flame_spray", "ice_cone", "flame_ring", "wind_god_feather", "wind_breath_bolt", "fireball_spell", "water_bullet"]
  };

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const ease = t => 1 - Math.pow(1 - clamp(t, 0, 1), 3);
  const manhattan = (a, b) => Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
  const keyOf = (x, y) => x + "," + y;
  const deepCopy = obj => JSON.parse(JSON.stringify(obj));

  function roundRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, rr);
  }

  class SeededRandom {
    constructor(seed) {
      this.seed = seed >>> 0;
      this.state = this.seed || 0x6d2b79f5;
    }
    next() {
      let t = this.state += 0x6d2b79f5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    int(max) {
      return Math.floor(this.next() * max);
    }
    pick(arr) {
      return arr[this.int(arr.length)];
    }
  }

  let CARD_SEQUENCE = 1;

  class Card {
    constructor(skill, star, inExtra) {
      this.id = CARD_SEQUENCE++;
      this.skill = skill;
      this.star = star || 1;
      this.inExtra = !!inExtra;
    }
  }

  class Unit {
    constructor(data, team, skillOrder) {
      this.id = data.id;
      this.name = data.name;
      this.short = data.short;
      this.team = team;
      this.type = data.type || "ally";
      this.x = data.x;
      this.y = data.y;
      this.renderX = data.x;
      this.renderY = data.y;
      this.maxHp = data.hp;
      this.hp = data.hp;
      this.shield = 0;
      this.speed = data.speed;
      this.gauge = 0;
      this.attack = data.attack || 0;
      this.range = data.range || 1;
      this.color = data.color || (team === "ally" ? CONFIG.COLORS.ally : CONFIG.COLORS.enemy);
      this.alive = true;
      this.deathFade = 1;
      this.vulnerableUntil = 0;
      this.skipTurns = 0;
      this.rootTurns = 0;
      this.slowTurns = 0;
      this.voidBuffAmount = 0;
      this.voidBuffTurns = 0;
      this.ownerId = data.ownerId || null;
      this.summonTurns = data.summonTurns || 0;
      this.passiveSlots = [null, null, null, null, null];
      this.skillBar = skillOrder ? skillOrder.slice() : [];
      this.cooldowns = {};
      this.cooldownStartedAt = {};
      SKILL_KEYS.forEach(k => this.cooldowns[k] = 0);
      SKILL_KEYS.forEach(k => this.cooldownStartedAt[k] = -1);
      this.hand = [];
      this.extraCard = null;
      this.actionCount = 0;
      this.maxActionPoints = team === "ally" ? CONFIG.ACTION_POINTS : 0;
      this.actionPoints = this.maxActionPoints;
    }
    hpRatio() {
      return this.hp / this.maxHp;
    }
    cooldownLeft(skill) {
      return Math.max(0, Math.ceil(this.cooldowns[skill] || 0));
    }
    isCooling(skill) {
      return this.cooldownLeft(skill) > 0;
    }
    setCooldown(skill, turns) {
      const value = Math.max(0, Math.floor(turns || 0));
      this.cooldowns[skill] = value;
      this.cooldownStartedAt[skill] = value > 0 ? this.actionCount : -1;
    }
    finishOwnTurnCooldowns() {
      SKILL_KEYS.forEach(skill => {
        if (this.cooldowns[skill] > 0 && this.cooldownStartedAt[skill] < this.actionCount) {
          this.cooldowns[skill]--;
          if (this.cooldowns[skill] <= 0) this.cooldownStartedAt[skill] = -1;
        }
      });
    }
    finishOwnTurnStatuses(game) {
      if (this.skipTurns > 0) this.skipTurns--;
      if (this.rootTurns > 0) this.rootTurns--;
      if (this.slowTurns > 0) this.slowTurns--;
      if (this.voidBuffTurns > 0) {
        this.voidBuffTurns--;
        if (this.voidBuffTurns <= 0 && this.voidBuffAmount > 0) {
          this.maxHp = Math.max(1, this.maxHp - this.voidBuffAmount);
          this.hp = Math.min(this.hp, this.maxHp);
          this.voidBuffAmount = 0;
          if (game) game.log(this.name + " 的虚空祝祷效果结束", "muted");
        }
      }
      if (this.type === "summon" && this.summonTurns > 0) {
        this.summonTurns--;
        if (this.summonTurns <= 0) {
          this.alive = false;
          this.deathFade = 1;
          if (game) game.log(this.name + " 完成 5 回合行动后消散", "muted");
        }
      }
    }
  }

  class GridMap {
    constructor(game) {
      this.game = game;
      this.obstacles = new Set([
        "1,2", "1,3", "5,2", "9,2", "12,2",
        "4,5", "5,5", "8,5", "9,5", "6,7",
        "2,8", "3,8", "10,9", "11,9",
        "5,10", "8,10", "2,12", "3,12", "10,12",
        "6,13", "7,13", "11,14", "12,14",
        "1,16", "2,16", "10,17", "11,17", "6,18",
        "3,20", "4,20", "9,20", "10,20", "6,22",
        "1,23", "12,23", "7,24"
      ]);
      this.dangers = new Set([
        "6,4", "7,6", "3,10", "9,11", "5,14", "9,15", "3,18", "12,6",
        "5,21", "9,24", "3,25"
      ]);
      this.burnZones = [];
      this.cameraX = 3.5;
      this.cameraY = 10;
      this.targetCameraX = this.cameraX;
      this.targetCameraY = this.cameraY;
      this.manualCamera = false;
    }
    inBounds(x, y) {
      return x >= 0 && y >= 0 && x < CONFIG.MAP_COLS && y < CONFIG.MAP_ROWS;
    }
    isObstacle(x, y) {
      return this.obstacles.has(keyOf(x, y));
    }
    unitAt(x, y, ignoreUnit) {
      return this.game.units.find(u => u.alive && u !== ignoreUnit && u.x === x && u.y === y) || null;
    }
    isBlocked(x, y, ignoreUnit) {
      return !this.inBounds(x, y) || this.isObstacle(x, y) || !!this.unitAt(x, y, ignoreUnit);
    }
    isDanger(x, y) {
      return this.dangers.has(keyOf(x, y));
    }
    neighbors(x, y) {
      return [
        { x: x, y: y - 1 },
        { x: x - 1, y: y },
        { x: x + 1, y: y },
        { x: x, y: y + 1 }
      ].filter(p => this.inBounds(p.x, p.y));
    }
    reachable(unit, maxSteps) {
      return this.reachableFrom(unit, { x: unit.x, y: unit.y }, maxSteps);
    }
    reachableFrom(unit, start, maxSteps) {
      const startKey = keyOf(start.x, start.y);
      const queue = [{ x: start.x, y: start.y, d: 0, path: [{ x: start.x, y: start.y }] }];
      const seen = new Set([startKey]);
      const result = [];
      while (queue.length) {
        const node = queue.shift();
        result.push(node);
        if (node.d >= maxSteps) continue;
        for (const n of this.neighbors(node.x, node.y)) {
          const k = keyOf(n.x, n.y);
          if (seen.has(k) || this.isBlocked(n.x, n.y, unit)) continue;
          seen.add(k);
          queue.push({ x: n.x, y: n.y, d: node.d + 1, path: node.path.concat([n]) });
        }
      }
      return result;
    }
    distanceToNearestDanger(pos) {
      let best = 999;
      this.dangers.forEach(k => {
        const parts = k.split(",");
        best = Math.min(best, Math.abs(pos.x - +parts[0]) + Math.abs(pos.y - +parts[1]));
      });
      return best;
    }
    purgeBurn(time) {
      this.burnZones = this.burnZones.filter(z => z.expiresAt > time);
    }
    focusOn(x, y, immediate) {
      const tx = clamp(x - (CONFIG.VIEW_COLS - 1) / 2, 0, CONFIG.MAP_COLS - CONFIG.VIEW_COLS);
      const ty = clamp(y - (CONFIG.VIEW_ROWS - 1) / 2, 0, CONFIG.MAP_ROWS - CONFIG.VIEW_ROWS);
      this.targetCameraX = tx;
      this.targetCameraY = ty;
      this.manualCamera = false;
      if (immediate) {
        this.cameraX = tx;
        this.cameraY = ty;
      }
    }
    panBy(dxCells, dyCells) {
      this.manualCamera = true;
      this.cameraX = clamp(this.cameraX + dxCells, 0, CONFIG.MAP_COLS - CONFIG.VIEW_COLS);
      this.cameraY = clamp(this.cameraY + dyCells, 0, CONFIG.MAP_ROWS - CONFIG.VIEW_ROWS);
      this.targetCameraX = this.cameraX;
      this.targetCameraY = this.cameraY;
    }
    centerCameraAt(x, y) {
      this.manualCamera = true;
      this.cameraX = clamp(x - CONFIG.VIEW_COLS / 2, 0, CONFIG.MAP_COLS - CONFIG.VIEW_COLS);
      this.cameraY = clamp(y - CONFIG.VIEW_ROWS / 2, 0, CONFIG.MAP_ROWS - CONFIG.VIEW_ROWS);
      this.targetCameraX = this.cameraX;
      this.targetCameraY = this.cameraY;
    }
    updateCamera(dt) {
      if (this.manualCamera) return;
      const t = 1 - Math.pow(0.004, Math.min(dt, 50) / 1000);
      this.cameraX = lerp(this.cameraX, this.targetCameraX, t);
      this.cameraY = lerp(this.cameraY, this.targetCameraY, t);
      if (Math.abs(this.cameraX - this.targetCameraX) < 0.002) this.cameraX = this.targetCameraX;
      if (Math.abs(this.cameraY - this.targetCameraY) < 0.002) this.cameraY = this.targetCameraY;
    }
    worldToScreen(x, y) {
      return {
        x: CONFIG.FIELD_X + (x - this.cameraX + 0.5) * CONFIG.CELL,
        y: CONFIG.FIELD_Y + (y - this.cameraY + 0.5) * CONFIG.CELL
      };
    }
    screenToWorld(sx, sy) {
      return {
        x: Math.floor(this.cameraX + (sx - CONFIG.FIELD_X) / CONFIG.CELL),
        y: Math.floor(this.cameraY + (sy - CONFIG.FIELD_Y) / CONFIG.CELL)
      };
    }
  }

  class HandManager {
    constructor(game) {
      this.game = game;
    }
    priority(unit, skill) {
      const i = unit.skillBar.indexOf(skill);
      return i < 0 ? 999 : i;
    }
    sortCards(unit, cards) {
      return cards.slice().sort((a, b) =>
        this.priority(unit, a.skill) - this.priority(unit, b.skill) ||
        b.star - a.star ||
        a.id - b.id
      );
    }
    handLimit(unit) {
      return Math.min(5, Math.floor(unit.skillBar.length / 2) + 1);
    }
    stateCards(state) {
      return state.hand.concat(state.extra ? [state.extra] : []);
    }
    cloneState(state) {
      return { hand: state.hand.slice(), extra: state.extra || null };
    }
    applyState(unit, state) {
      const oldCards = unit.hand.concat(unit.extraCard ? [unit.extraCard] : []);
      oldCards.concat(this.stateCards(state)).forEach(c => c.inExtra = false);
      state.hand.forEach(c => c.inExtra = false);
      if (state.extra) state.extra.inExtra = true;
      unit.hand = state.hand.slice();
      unit.extraCard = state.extra || null;
    }
    findMerge(unit, cards) {
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (card.star >= 3) continue;
        for (let j = i + 1; j < cards.length; j++) {
          const mate = cards[j];
          if (mate.skill === card.skill && mate.star === card.star) {
            return { pair: [card, mate], firstIndex: i, secondIndex: j };
          }
        }
      }
      return null;
    }
    planAction(unit) {
      let state = { hand: unit.hand.slice(), extra: unit.extraCard || null };
      const operations = [];
      let draws = 0;
      let guard = 0;
      let lockedExtra = null;
      const limit = this.handLimit(unit);
      const drawIntoRightmostSlot = () => {
        if (state.hand.length >= limit || draws >= CONFIG.MAX_DRAWS_PER_ACTION || !unit.skillBar.length) {
          return false;
        }
        const skill = unit.skillBar[this.game.rng.int(unit.skillBar.length)];
        const card = new Card(skill, 1, false);
        const after = this.cloneState(state);
        after.hand.push(card);
        operations.push({
          type: "draw", before: this.cloneState(state), after: this.cloneState(after), card: card
        });
        state = after;
        draws++;
        return true;
      };
      const syncCoolingExtra = () => {
        if (lockedExtra && state.extra === lockedExtra) return false;
        const card = this.sortCards(
          unit,
          this.stateCards(state).filter(item => unit.isCooling(item.skill))
        )[0];
        if (!card || state.extra === card) return false;
        if (!state.extra) {
          const after = {
            hand: state.hand.filter(item => item !== card),
            extra: card
          };
          operations.push({
            type: "stash", before: this.cloneState(state), after: this.cloneState(after), card: card
          });
          state = after;
          return true;
        }
        const index = state.hand.indexOf(card);
        if (index < 0) return false;
        const outgoing = state.extra;
        const after = this.cloneState(state);
        after.hand[index] = outgoing;
        after.extra = card;
        operations.push({
          type: "swapExtra", before: this.cloneState(state), after: this.cloneState(after),
          card: card, outgoing: outgoing
        });
        state = after;
        return true;
      };

      // 上回合遗留的冷却牌若尚未进入保留槽，先用显式动画归位，绝不在首个抽牌帧瞬移。
      syncCoolingExtra();

      // 先按抽取顺序依次填入 1…N 槽；在初次补满前不检查合成，也不改变已有卡牌槽位。
      let initialDraws = 0;
      while (state.hand.length < limit && guard++ < 500 && drawIntoRightmostSlot()) {
        initialDraws++;
        syncCoolingExtra();
      }

      // 初次补牌结束后才显式整理：逻辑队列的排序不再偷偷改变屏幕上的槽位。
      if (initialDraws > 0 && state.hand.length > 1) {
        const after = this.cloneState(state);
        after.hand = this.sortCards(unit, state.hand);
        operations.push({
          type: "sort", before: this.cloneState(state), after: this.cloneState(after),
          cards: this.stateCards(state).slice()
        });
        state = after;
      }

      // 每轮严格执行：检查合成 → 保留较小槽位并左移补空 → 从右侧补一张 → 再检查。
      while (guard++ < 500) {
        const cards = this.stateCards(state);
        const match = this.findMerge(unit, cards);
        if (!match) {
          if (drawIntoRightmostSlot()) {
            syncCoolingExtra();
            continue;
          }
          break;
        }
        const pair = match.pair;
        const merged = new Card(pair[0].skill, pair[0].star + 1, false);
        const mergesIntoExtra = !!state.extra && pair.includes(state.extra);
        let compacted;
        let after;
        if (mergesIntoExtra) {
          compacted = cards.filter(card => !pair.includes(card));
          after = { hand: compacted.slice(0, limit), extra: merged };
        } else {
          compacted = cards.slice();
          compacted[match.firstIndex] = merged;
          compacted.splice(match.secondIndex, 1);
          after = {
            hand: compacted.filter(card => card !== state.extra).slice(0, limit),
            extra: state.extra || null
          };
        }
        operations.push({
          type: "merge", before: this.cloneState(state), after: this.cloneState(after),
          pair: pair.slice(), merged: merged,
          firstIndex: match.firstIndex, secondIndex: match.secondIndex,
          mergesIntoExtra: mergesIntoExtra
        });
        state = after;
        if (mergesIntoExtra) lockedExtra = merged;
        syncCoolingExtra();
        if (drawIntoRightmostSlot()) syncCoolingExtra();
        continue;
      }
      const finalSortedHand = this.sortCards(unit, state.hand);
      if (finalSortedHand.some((card, index) => card !== state.hand[index])) {
        const after = this.cloneState(state);
        after.hand = finalSortedHand;
        operations.push({
          type: "sort", before: this.cloneState(state), after: this.cloneState(after),
          cards: this.stateCards(state).slice()
        });
        state = after;
      }
      if (state.hand.length < limit && draws >= CONFIG.MAX_DRAWS_PER_ACTION) {
        console.warn("[HandManager] 单次行动抽牌达到上限", unit.id);
        this.game.log("抽牌达到 100 张保护上限", "warn");
      }
      // 普通手牌按可见顺序整理；结束冷却的保留牌仍按已装配技能优先级插入行动队列。
      const queue = this.sortCards(unit, this.stateCards(state));
      return {
        operations: operations,
        finalState: this.cloneState(state),
        queue: queue,
        draws: draws,
        handLimit: this.handLimit(unit)
      };
    }
    removeCard(unit, card) {
      unit.hand = unit.hand.filter(c => c !== card);
      if (unit.extraCard === card) unit.extraCard = null;
    }
    normalizeAfterAction(unit) {
      // 冷却牌的保留槽调整必须留到下次行动准备阶段播放动画，这里只维护基本容量不变量。
      unit.hand = unit.hand.filter(card => card !== unit.extraCard).slice(0, this.handLimit(unit));
    }
  }

  class SkillSystem {
    constructor(game) {
      this.game = game;
    }
    alliesOf(unit) {
      return this.game.units.filter(u => u.alive && u.team === unit.team);
    }
    enemiesOf(unit) {
      return this.game.units.filter(u => u.alive && u.team !== unit.team);
    }
    chooseStable(list, scoreFn, descending) {
      if (!list.length) return null;
      return list.slice().sort((a, b) => {
        const d = scoreFn(a) - scoreFn(b);
        if (Math.abs(d) > 0.0001) return descending ? -d : d;
        return a.id.localeCompare(b.id);
      })[0];
    }
    stableRandomIndex(parts, length) {
      if (length <= 1) return 0;
      const text = [this.game.seed].concat(parts).join(":");
      let hash = 2166136261;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0) % length;
    }
    directions() {
      return ["up", "right", "down", "left"];
    }
    rotateOffset(offset, direction) {
      if (direction === "right") return { x: -offset.y, y: offset.x };
      if (direction === "down") return { x: -offset.x, y: -offset.y };
      if (direction === "left") return { x: offset.y, y: -offset.x };
      return { x: offset.x, y: offset.y };
    }
    shapeOffsets(shape, direction) {
      const offsets = [];
      if (!shape) return [{ x: 0, y: 0 }];
      if (shape.type === "diamond") {
        for (let y = -shape.radius; y <= shape.radius; y++) {
          for (let x = -shape.radius; x <= shape.radius; x++) {
            if (Math.abs(x) + Math.abs(y) > shape.radius) continue;
            if (shape.excludeOrigin && x === 0 && y === 0) continue;
            offsets.push({ x: x, y: y });
          }
        }
      } else if (shape.type === "square") {
        for (let y = -shape.radius; y <= shape.radius; y++) {
          for (let x = -shape.radius; x <= shape.radius; x++) offsets.push({ x: x, y: y });
        }
      } else if (shape.type === "rectangle") {
        const half = Math.floor(shape.width / 2);
        for (let forward = 1; forward <= shape.depth; forward++) {
          for (let side = -half; side <= half; side++) {
            offsets.push(this.rotateOffset({ x: side, y: -forward }, direction || "up"));
          }
        }
      } else {
        offsets.push({ x: 0, y: 0 });
      }
      return offsets;
    }
    cellsFromShape(origin, shape, direction) {
      return this.shapeOffsets(shape, direction).map(offset => ({
        x: origin.x + offset.x,
        y: origin.y + offset.y
      })).filter(cell => this.game.map.inBounds(cell.x, cell.y));
    }
    aimCells(origin, minRange, maxRange) {
      const result = [];
      const min = Math.max(0, minRange || 0);
      for (let y = 0; y < CONFIG.MAP_ROWS; y++) {
        for (let x = 0; x < CONFIG.MAP_COLS; x++) {
          const cell = { x: x, y: y };
          const distance = manhattan(origin, cell);
          if (distance >= min && distance <= maxRange) result.push(cell);
        }
      }
      return result;
    }
    unitsInCells(units, cells) {
      const keys = new Set(cells.map(cell => keyOf(cell.x, cell.y)));
      return units.filter(unit => keys.has(keyOf(unit.x, unit.y)));
    }
    makePlan(cell, affectedCells, targets, allies, direction, primary) {
      return {
        id: keyOf(cell.x, cell.y) + ":" + (direction || "none"),
        cell: { x: cell.x, y: cell.y },
        affectedCells: (affectedCells || []).map(p => ({ x: p.x, y: p.y })),
        targets: (targets || []).slice(),
        allies: (allies || []).slice(),
        direction: direction || null,
        primary: primary || (targets && targets[0]) || (allies && allies[0]) || null
      };
    }
    needsDispel(unit) {
      return (unit.skipTurns || 0) > 0 || (unit.rootTurns || 0) > 0 ||
        (unit.slowTurns || 0) > 0 || unit.vulnerableUntil > this.game.battle.time;
    }
    hasPotentialTarget(actor, card) {
      const def = SKILL_DEFS[card.skill];
      if (!def) return false;
      if (def.kind === "singleAlly") {
        return this.alliesOf(actor).some(u => u.type !== "summon" && (u.hp < u.maxHp || this.needsDispel(u)));
      }
      if (def.kind === "groundAllyAoe") return this.alliesOf(actor).some(u => u.type !== "summon");
      if (def.kind === "summon") return true;
      return this.enemiesOf(actor).length > 0;
    }
    findTarget(actor, card, pos) {
      const def = SKILL_DEFS[card.skill];
      if (!def) return null;
      const origin = pos || { x: actor.x, y: actor.y };
      const allies = this.alliesOf(actor);
      const selectableAllies = allies.filter(u => u.type !== "summon");
      const enemies = this.enemiesOf(actor);

      if (def.kind === "selfAoe") {
        const cells = this.cellsFromShape(origin, def.shape);
        const targets = this.unitsInCells(enemies, cells);
        return targets.length ? this.makePlan(origin, cells, targets, [], null, targets[0]) : null;
      }

      if (def.kind === "directionalDamage") {
        const plans = this.directions().map(direction => {
          const cells = this.cellsFromShape(origin, def.shape, direction);
          const targets = this.unitsInCells(enemies, cells);
          const endOffset = this.rotateOffset({ x: 0, y: -def.shape.depth }, direction);
          const aim = targets[0] ? { x: targets[0].x, y: targets[0].y } : { x: origin.x + endOffset.x, y: origin.y + endOffset.y };
          return this.makePlan(aim, cells, targets, [], direction, targets[0]);
        }).filter(plan => plan.targets.length);
        plans.sort((a, b) =>
          b.targets.length - a.targets.length ||
          a.targets.reduce((sum, u) => sum + u.hp, 0) - b.targets.reduce((sum, u) => sum + u.hp, 0) ||
          this.directions().indexOf(a.direction) - this.directions().indexOf(b.direction)
        );
        return plans[0] || null;
      }

      if (def.kind === "singleEnemy") {
        const minRange = def.minRange || 0;
        const targets = enemies.filter(u => {
          const distance = manhattan(origin, u);
          return distance >= minRange && distance <= def.castRange;
        });
        const allRatiosEqual = targets.length > 1 && targets.every(unit => Math.abs(unit.hpRatio() - targets[0].hpRatio()) < .0001);
        if (allRatiosEqual) {
          targets.sort((a, b) => a.id.localeCompare(b.id));
          const index = this.stableRandomIndex(
            [actor.id, actor.actionCount, card.skill, origin.x, origin.y], targets.length
          );
          const target = targets[index];
          return target ? this.makePlan(target, [target], [target], [], null, target) : null;
        }
        targets.sort((a, b) =>
          a.hpRatio() - b.hpRatio() ||
          manhattan(origin, a) - manhattan(origin, b) ||
          a.id.localeCompare(b.id)
        );
        const target = targets[0];
        return target ? this.makePlan(target, [target], [target], [], null, target) : null;
      }

      if (def.kind === "singleAlly") {
        const targets = selectableAllies.filter(u =>
          manhattan(origin, u) <= def.castRange && (u.hp < u.maxHp || this.needsDispel(u))
        ).sort((a, b) =>
          a.hpRatio() - b.hpRatio() ||
          (this.needsDispel(b) ? 1 : 0) - (this.needsDispel(a) ? 1 : 0) ||
          manhattan(origin, a) - manhattan(origin, b) || a.id.localeCompare(b.id)
        );
        const target = targets[0];
        return target ? this.makePlan(target, [target], [], [target], null, target) : null;
      }

      if (def.kind === "groundVolley") {
        // 先选取 6 格内的地块作为锚点。7 波风刃只会在锚点及其左右 1 格的
        // 敌人之间随机选取，每一波再对所选目标周围 1 格造成范围伤害。
        const plans = this.aimCells(origin, 0, def.castRange).map(cell => {
          const candidateCells = [];
          for (let dx = -def.candidateHalfWidth; dx <= def.candidateHalfWidth; dx++) {
            candidateCells.push({ x: cell.x + dx, y: cell.y });
          }
          const candidates = this.unitsInCells(enemies, candidateCells);
          const affectedByKey = new Map();
          candidates.forEach(candidate => {
            this.cellsFromShape(candidate, { type: "diamond", radius: def.waveRadius }).forEach(cell => {
              affectedByKey.set(keyOf(cell.x, cell.y), cell);
            });
          });
          const affectedCells = Array.from(affectedByKey.values());
          const targets = this.unitsInCells(enemies, affectedCells);
          const primary = candidates.slice().sort((a, b) => a.hpRatio() - b.hpRatio() || a.id.localeCompare(b.id))[0] || null;
          const plan = this.makePlan(cell, affectedCells, targets, [], null, primary);
          plan.volleyCandidates = candidates.slice();
          return plan;
        }).filter(plan => plan.volleyCandidates.length && plan.targets.length);
        plans.sort((a, b) =>
          b.targets.length - a.targets.length ||
          b.volleyCandidates.length - a.volleyCandidates.length ||
          a.primary.hpRatio() - b.primary.hpRatio() ||
          manhattan(origin, a.primary) - manhattan(origin, b.primary) ||
          a.id.localeCompare(b.id)
        );
        return plans[0] || null;
      }

      if (def.kind === "groundEnemyAoe") {
        const plans = this.aimCells(origin, 0, def.castRange).map(cell => {
          const cells = this.cellsFromShape(cell, def.shape);
          const targets = this.unitsInCells(enemies, cells);
          return this.makePlan(cell, cells, targets, [], null, targets[0]);
        }).filter(plan => plan.targets.length);
        plans.sort((a, b) =>
          b.targets.length - a.targets.length ||
          a.targets.reduce((sum, u) => sum + u.hp, 0) - b.targets.reduce((sum, u) => sum + u.hp, 0) ||
          manhattan(origin, b.cell) - manhattan(origin, a.cell) || a.id.localeCompare(b.id)
        );
        return plans[0] || null;
      }

      if (def.kind === "groundAllyAoe") {
        const plans = this.aimCells(origin, 0, def.castRange).map(cell => {
          const cells = this.cellsFromShape(cell, def.shape);
          const covered = this.unitsInCells(selectableAllies, cells);
          return this.makePlan(cell, cells, [], covered, null, covered[0]);
        }).filter(plan => plan.allies.length);
        plans.sort((a, b) => {
          const aUrgency = a.allies.reduce((sum, u) => sum + (1 - u.hpRatio()) * 2 + (u.hpRatio() < .3 ? 2 : 0), 0);
          const bUrgency = b.allies.reduce((sum, u) => sum + (1 - u.hpRatio()) * 2 + (u.hpRatio() < .3 ? 2 : 0), 0);
          return b.allies.length - a.allies.length || bUrgency - aUrgency ||
            manhattan(origin, b.cell) - manhattan(origin, a.cell) || a.id.localeCompare(b.id);
        });
        return plans[0] || null;
      }

      if (def.kind === "summon") {
        if (!this.hasPotentialTarget(actor, card)) return null;
        const plans = this.directions().map(direction => {
          const offset = this.rotateOffset({ x: 0, y: -def.summonDistance }, direction);
          const cell = { x: origin.x + offset.x, y: origin.y + offset.y };
          if (this.game.map.isBlocked(cell.x, cell.y, actor)) return null;
          return this.makePlan(cell, [cell], [], [], direction, null);
        }).filter(Boolean).sort((a, b) =>
          this.game.ai && this.game.ai.enemyThreatAt(a.cell, actor.team) - this.game.ai.enemyThreatAt(b.cell, actor.team) ||
          this.game.map.isDanger(a.cell.x, a.cell.y) - this.game.map.isDanger(b.cell.x, b.cell.y) ||
          a.id.localeCompare(b.id)
        );
        return plans[0] || null;
      }
      return null;
    }
    targetDistance(pos, plan) {
      const units = plan.targets.length ? plan.targets : plan.allies.length ? plan.allies : plan.primary ? [plan.primary] : [];
      return units.length ? Math.min.apply(null, units.map(unit => manhattan(pos, unit))) : manhattan(pos, plan.cell);
    }
    estimate(actor, card, pos) {
      const plan = this.findTarget(actor, card, pos);
      if (!plan) return { castable: false, damage: 0, heal: 0, aoe: 0, kills: 0, targetDistance: 0, plan: null };
      const def = SKILL_DEFS[card.skill];
      const star = clamp(card.star, 1, 3) - 1;
      let damage = 0;
      let heal = 0;
      let kills = 0;
      const targets = plan.targets || [];
      const hitCount = def.hits || 1;
      const base = def.damage ? def.damage[star] : def.perHit ? def.perHit[star] : 0;
      if (def.kind === "groundVolley") {
        const candidates = plan.volleyCandidates || targets;
        const repeatCounts = new Map();
        const damageByTarget = new Map();
        for (let i = 0; i < def.shots; i++) {
          const center = candidates[i % candidates.length];
          targets.filter(unit => manhattan(unit, center) <= def.waveRadius).forEach(unit => {
            const repeats = repeatCounts.get(unit.id) || 0;
            const amount = Math.max(1, base * Math.pow(1 - def.repeatDecay, repeats));
            damage += amount;
            damageByTarget.set(unit.id, (damageByTarget.get(unit.id) || 0) + amount);
            repeatCounts.set(unit.id, repeats + 1);
          });
        }
        kills = targets.filter(unit => (damageByTarget.get(unit.id) || 0) >= unit.hp).length;
      } else if (def.kind === "summon") {
        damage = this.summonStats(actor, def, star).attack * 2;
      } else {
        const perTarget = base * hitCount;
        damage = perTarget * targets.length;
        kills = targets.filter(u => perTarget >= u.hp).length;
      }
      if (def.kind === "singleAlly") {
        const target = plan.allies[0];
        heal = Math.min(def.heal[star], target.maxHp - target.hp) + (this.needsDispel(target) ? 12 : 0);
      }
      if (def.kind === "groundAllyAoe") {
        heal = plan.allies.reduce((sum, unit) => sum + this.voidBuffValue(unit, def.maxHpBuffRatio[star]), 0) + plan.allies.reduce((sum, u) =>
          sum + (u.hpRatio() < .3 ? Math.ceil(u.maxHp * def.emergencyHealRatio) : 0), 0
        );
      }
      return {
        castable: true, damage: Math.round(damage), heal: Math.round(heal),
        aoe: Math.max(0, targets.length - 1), kills: kills,
        targetDistance: this.targetDistance(pos || actor, plan), plan: plan
      };
    }
    impactMoment(skill) {
      return skill === "wind_breath_bolt" || skill === "wind_god_feather" || skill === "flame_spray" ? .76 :
        skill === "stone_chief" ? .58 : skill === "healing_spell" || skill === "void_prayer" ? .48 : .57;
    }
    playCastEffect(actor, card, target) {
      const def = SKILL_DEFS[card.skill];
      const star = card.star;
      const from = { x: actor.x, y: actor.y };
      const primary = target.primary || target.targets[0] || target.allies[0];
      if (card.skill === "fireball_spell") {
        this.game.renderer.addEffect("fireball", {
          from: from, to: target.cell, color: def.color, star: star
        }, 760);
      } else if (card.skill === "healing_spell" && primary) {
        this.game.renderer.addEffect("heal", {
          x: primary.x, y: primary.y, color: def.color, star: star
        }, 780);
      } else if (card.skill === "void_prayer") {
        target.allies.forEach(unit => this.game.renderer.addEffect("shield", {
          x: unit.x, y: unit.y, color: def.color, star: star
        }, 780));
      } else if (card.skill === "wind_god_feather") {
        const livingCandidates = (target.volleyCandidates || target.targets).filter(unit => unit.alive);
        target.preparedVolleyCenters = [];
        for (let i = 0; i < def.shots && livingCandidates.length; i++) {
          const unit = livingCandidates[this.game.rng.int(livingCandidates.length)];
          target.preparedVolleyCenters.push({ x: unit.x, y: unit.y, unitId: unit.id });
        }
        this.game.renderer.addEffect("rapid", {
          from: from,
          to: target.cell,
          tos: target.preparedVolleyCenters.map(center => ({ x: center.x, y: center.y })),
          color: def.color, hits: def.shots, star: star
        }, 700);
      } else if (card.skill === "wind_breath_bolt" || card.skill === "flame_spray") {
        this.game.renderer.addEffect("rapid", {
          from: from, to: primary ? { x: primary.x, y: primary.y } : target.cell, color: def.color,
          hits: def.shots || def.hits || 3, star: star
        }, 700);
      } else if (card.skill === "thorn_incantation" && primary) {
        this.game.renderer.addEffect("chain", { from: from, targetUnit: primary, color: def.color, star: star }, 720);
      } else if (card.skill === "water_bullet" && primary) {
        this.game.renderer.addEffect("projectile", {
          from: from, to: { x: primary.x, y: primary.y }, color: def.color, shape: "orb"
        }, 620);
      } else if (card.skill === "stone_chief") {
        this.game.renderer.addEffect("aura", { x: target.cell.x, y: target.cell.y, color: def.color, star: star }, 760);
      } else if (card.skill === "flame_ring") {
        this.game.renderer.addEffect("aura", { x: actor.x, y: actor.y, color: def.color, star: star }, 720);
      } else {
        this.game.renderer.addEffect("projectile", {
          from: from, to: target.cell, color: def.color, shape: "multi"
        }, 680);
      }
    }
    playResolveEffect(actor, card, target) {
      const def = SKILL_DEFS[card.skill];
      if (["groundEnemyAoe", "groundVolley", "directionalDamage", "selfAoe"].includes(def.kind)) {
        this.game.renderer.addEffect("burst", {
          x: target.cell.x, y: target.cell.y, color: def.color, star: card.star
        }, 560);
      }
    }
    applyVoidBuff(unit, amount, turns) {
      const oldAmount = Math.max(0, unit.voidBuffAmount || 0);
      const baseMaxHp = Math.max(1, unit.maxHp - oldAmount);
      unit.voidBuffAmount = amount;
      unit.voidBuffTurns = turns;
      unit.maxHp = baseMaxHp + amount;
      // 首次获得或换成更高档增益时只补足“新增上限差额”；同档刷新只续时长，不能重复治疗。
      const gained = Math.max(0, amount - oldAmount);
      unit.hp = Math.min(unit.maxHp, unit.hp + gained);
      this.game.renderer.addFloat(unit.x, unit.y, gained > 0 ? "+" + gained + "生命" : "生命上限续期", "#e6ca72");
    }
    voidBuffValue(unit, ratio) {
      const baseMaxHp = Math.max(1, unit.maxHp - (unit.voidBuffAmount || 0));
      return Math.max(1, Math.ceil(baseMaxHp * ratio));
    }
    dispelOne(unit) {
      const options = [];
      if (unit.skipTurns > 0) options.push({ name: "冰冻/浮空", clear: () => unit.skipTurns = 0 });
      if (unit.rootTurns > 0) options.push({ name: "定身", clear: () => unit.rootTurns = 0 });
      if (unit.slowTurns > 0) options.push({ name: "减速", clear: () => unit.slowTurns = 0 });
      if (unit.vulnerableUntil > this.game.battle.time) options.push({ name: "易伤", clear: () => unit.vulnerableUntil = 0 });
      if (!options.length) return "";
      const chosen = options[this.game.rng.int(options.length)];
      chosen.clear();
      return chosen.name;
    }
    summonStats(actor, def, star) {
      const inheritedPower = actor.attack > 0 ? actor.attack : Math.max(1, Math.round(actor.maxHp * .13));
      return {
        hp: Math.max(1, Math.round(actor.maxHp * def.summonHpRatio[star])),
        attack: Math.max(1, Math.round(inheritedPower * def.summonAttackRatio[star]))
      };
    }
    summonStone(actor, target, def, star) {
      const stats = this.summonStats(actor, def, star);
      const data = {
        id: "summon" + (this.game.summonSequence++), name: "石酋", short: "石",
        type: "summon", x: target.cell.x, y: target.cell.y,
        hp: stats.hp, speed: Math.max(10, actor.speed - 2),
        attack: stats.attack, range: 1, color: "#a99b73", summon: true
      };
      const unit = new Unit(data, actor.team, []);
      unit.ownerId = actor.id;
      unit.summonTurns = def.summonTurns;
      unit.maxActionPoints = 0;
      unit.actionPoints = 0;
      unit.gauge = CONFIG.ACTION_THRESHOLD;
      unit.immediateAction = true;
      this.game.units.push(unit);
      this.game.renderer.addFloat(unit.x, unit.y, "石酋参战", def.color);
      return unit;
    }
    pullTargetsToAim(targets, aimCell) {
      const destinations = this.cellsFromShape(aimCell, { type: "diamond", radius: 2 })
        .filter(cell => !(cell.x === aimCell.x && cell.y === aimCell.y))
        .sort((a, b) => manhattan(a, aimCell) - manhattan(b, aimCell) || a.y - b.y || a.x - b.x);
      targets.filter(unit => unit.alive).forEach(unit => {
        const destination = destinations.find(cell =>
          manhattan(cell, aimCell) < manhattan(unit, aimCell) && !this.game.map.isBlocked(cell.x, cell.y, unit)
        );
        if (!destination) return;
        unit.x = destination.x;
        unit.y = destination.y;
        unit.renderX = destination.x;
        unit.renderY = destination.y;
      });
    }
    cast(actor, card, target) {
      const def = SKILL_DEFS[card.skill];
      const star = clamp(card.star, 1, 3) - 1;
      const from = { x: actor.x, y: actor.y };
      const result = { kind: card.skill, target: target, from: from, motion: null, color: def.color };
      if (def.kind === "groundAllyAoe") {
        target.allies.forEach(unit => {
          const wasEmergency = unit.hpRatio() < .3;
          this.applyVoidBuff(unit, this.voidBuffValue(unit, def.maxHpBuffRatio[star]), def.durationTurns);
          if (wasEmergency) this.game.applyHeal(actor, unit, Math.ceil(unit.maxHp * def.emergencyHealRatio), def.name);
        });
        this.game.log(actor.name + " 的「" + def.name + "」覆盖 " + target.allies.length + " 名友方", "skill");
        return result;
      }
      if (def.kind === "singleAlly") {
        const unit = target.allies[0];
        this.game.applyHeal(actor, unit, def.heal[star], def.name);
        const removed = def.dispel ? this.dispelOne(unit) : "";
        if (removed) this.game.renderer.addFloat(unit.x, unit.y, "驱散" + removed, def.color);
        this.game.log(actor.name + " 对 " + unit.name + " 施放「" + def.name + "」" + (removed ? "并驱散" + removed : ""), "skill");
        return result;
      }
      if (def.kind === "summon") {
        const summon = this.summonStone(actor, target, def, star);
        this.game.log(actor.name + " 召唤 " + summon.name + "，将立即行动", "skill");
        return result;
      }

      if (def.kind === "groundVolley") {
        const repeatCounts = new Map();
        const originalCandidates = (target.volleyCandidates || target.targets).filter(unit => unit.alive);
        const preparedCenters = (target.preparedVolleyCenters || []).map(center => ({ x: center.x, y: center.y }));
        while (preparedCenters.length < def.shots && originalCandidates.length) {
          const unit = originalCandidates[this.game.rng.int(originalCandidates.length)];
          preparedCenters.push({ x: unit.x, y: unit.y });
        }
        result.volleyHits = [];
        for (let i = 0; i < def.shots; i++) {
          const center = preparedCenters[i];
          if (!center) break;
          const victims = this.enemiesOf(actor).filter(unit => unit.alive && manhattan(unit, center) <= def.waveRadius);
          if (!victims.length) continue;
          result.volleyHits.push({ wave: i, x: center.x, y: center.y, targetIds: victims.map(unit => unit.id) });
          victims.forEach(unit => {
            const repeats = repeatCounts.get(unit.id) || 0;
            const amount = Math.max(1, Math.round(def.perHit[star] * Math.pow(1 - def.repeatDecay, repeats)));
            this.game.applyDamage(actor, unit, amount, def.name);
            repeatCounts.set(unit.id, repeats + 1);
          });
        }
      } else {
        const hits = def.hits || 1;
        const amount = def.damage ? def.damage[star] : def.perHit ? def.perHit[star] : 0;
        target.targets.forEach(unit => {
          for (let hit = 0; hit < hits && unit.alive; hit++) this.game.applyDamage(actor, unit, amount, def.name);
        });
      }

      target.targets.filter(unit => unit.alive).forEach(unit => {
        if (def.freezeChance && this.game.rng.next() < def.freezeChance) {
          unit.skipTurns = Math.max(unit.skipTurns || 0, def.freezeTurns);
          this.game.renderer.addFloat(unit.x, unit.y, "冰冻", "#83cffa");
        }
        if (def.rootChance && this.game.rng.next() < def.rootChance) {
          unit.rootTurns = Math.max(unit.rootTurns || 0, def.rootTurns);
          this.game.renderer.addFloat(unit.x, unit.y, "定身", "#88c69b");
        }
        if (def.airborneTurns) {
          unit.skipTurns = Math.max(unit.skipTurns || 0, def.airborneTurns);
          this.game.renderer.addFloat(unit.x, unit.y, "浮空", "#8ed9ca");
        }
      });
      if (def.pullToAim) this.pullTargetsToAim(target.targets, target.cell);
      this.game.log(actor.name + " 的「" + def.name + "」命中 " + target.targets.length + " 个目标", "skill");
      return result;
    }
  }

  class BattleAI {
    constructor(game) {
      this.game = game;
    }
    reachableForThreat(enemy, maxSteps, occupiedPos, movingUnit) {
      const queue = [{ x: enemy.x, y: enemy.y, d: 0 }];
      const seen = new Set([keyOf(enemy.x, enemy.y)]);
      const result = [];
      while (queue.length) {
        const node = queue.shift();
        result.push(node);
        if (node.d >= maxSteps) continue;
        this.game.map.neighbors(node.x, node.y).forEach(next => {
          const key = keyOf(next.x, next.y);
          if (seen.has(key) || this.game.map.isObstacle(next.x, next.y)) return;
          if (occupiedPos && next.x === occupiedPos.x && next.y === occupiedPos.y) return;
          const occupied = this.game.units.some(unit =>
            unit.alive && unit !== enemy && unit !== movingUnit && unit.x === next.x && unit.y === next.y
          );
          if (occupied) return;
          seen.add(key);
          queue.push({ x: next.x, y: next.y, d: node.d + 1 });
        });
      }
      return result;
    }
    enemyThreatSummary(pos, team, movingUnit) {
      let count = 0;
      let damage = 0;
      this.game.units.filter(u => u.alive && u.team !== team).forEach(enemy => {
        const baseMove = enemy.team === "enemy" ? CONFIG.ENEMY_MOVE : 0;
        const moveSteps = enemy.rootTurns > 0 ? 0 : enemy.slowTurns > 0 ? Math.max(0, baseMove - 1) : baseMove;
        const range = enemy.range || 1;
        // 评估假想落点时释放角色的旧格，并把新格视作已被角色占据。
        const nodes = this.reachableForThreat(enemy, moveSteps, pos, movingUnit || null);
        if (nodes.some(node => manhattan(node, pos) <= range)) {
          count++;
          damage += enemy.attack || 12;
        }
      });
      return { count: count, damage: damage };
    }
    enemyThreatAt(pos, team, movingUnit) {
      return this.enemyThreatSummary(pos, team, movingUnit).count;
    }
    adjacentEnemyCount(pos, team) {
      return this.game.units.filter(u => u.alive && u.team !== team && manhattan(pos, u) <= 1).length;
    }
    isHostileZone(pos, team) {
      return this.game.map.isDanger(pos.x, pos.y) || this.game.map.burnZones.some(zone =>
        zone.x === pos.x && zone.y === pos.y && zone.team !== team && zone.expiresAt > this.game.battle.time
      );
    }
    nearestEnemyDistance(pos, team) {
      const enemies = this.game.units.filter(u => u.alive && u.team !== team);
      return enemies.length ? Math.min.apply(null, enemies.map(e => manhattan(pos, e))) : 0;
    }
    scorePosition(unit, queue, node) {
      const W = CONFIG.AI_WEIGHTS;
      let score = 0;
      let castable = 0;
      let damage = 0;
      let heal = 0;
      let aoe = 0;
      let kills = 0;
      const tempCd = Object.assign({}, unit.cooldowns);
      for (const card of queue) {
        if ((tempCd[card.skill] || 0) > 0) continue;
        const est = this.game.skills.estimate(unit, card, node);
        if (!est.castable) continue;
        castable++;
        damage += est.damage;
        heal += est.heal;
        aoe += est.aoe;
        kills += est.kills;
        const cd = SKILL_DEFS[card.skill].cooldownTurns;
        if (cd > 0) tempCd[card.skill] = cd;
      }
      const enemyDist = this.nearestEnemyDistance(node, unit.team);
      const threat = this.enemyThreatAt(node, unit.team, unit);
      score += castable * W.CASTABLE_CARD;
      score += damage * W.DAMAGE;
      score += heal * W.HEAL;
      score += aoe * W.AOE_HIT;
      score += kills * W.KILL;
      score += this.game.map.isDanger(node.x, node.y) ? W.DANGER_TILE : 0;
      score += threat * W.ENEMY_THREAT;
      score += Math.min(enemyDist, 6) * W.SAFETY_DISTANCE;
      score -= enemyDist * W.APPROACH;
      return { score: score, castable: castable, damage: damage, heal: heal, aoe: aoe, kills: kills };
    }
    choosePosition(unit, queue) {
      const nodes = this.game.map.reachable(unit, CONFIG.ACTION_POINTS * CONFIG.MOVE_PER_ACTION_POINT);
      const scored = nodes.map(node => Object.assign(node, this.scorePosition(unit, queue, node)));
      scored.sort((a, b) =>
        b.score - a.score ||
        a.d - b.d ||
        this.game.map.distanceToNearestDanger(b) - this.game.map.distanceToNearestDanger(a)
      );
      const bestScore = scored[0].score;
      const bestDistance = scored.filter(n => Math.abs(n.score - bestScore) < 0.0001)
        .reduce((m, n) => Math.min(m, n.d), 999);
      let tied = scored.filter(n => Math.abs(n.score - bestScore) < 0.0001 && n.d === bestDistance);
      const bestDangerDistance = Math.max.apply(null, tied.map(n => this.game.map.distanceToNearestDanger(n)));
      tied = tied.filter(n => this.game.map.distanceToNearestDanger(n) === bestDangerDistance);
      const chosen = tied.length > 1 ? tied[this.game.rng.int(tied.length)] : tied[0];
      this.game.log(
        unit.name + " 的整手牌 AI 选择 (" + (chosen.x + 1) + "," + (chosen.y + 1) + ")，评分 " + chosen.score.toFixed(1),
        "ai"
      );
      return chosen;
    }
    castPositionRecord(unit, card, node, estimate, remainingQueue) {
      const W = CONFIG.AI_WEIGHTS;
      const def = SKILL_DEFS[card.skill];
      const threat = this.enemyThreatSummary(node, unit.team, unit);
      const simulatedCooling = new Set(SKILL_KEYS.filter(skill => unit.isCooling(skill)));
      if (def.cooldownTurns > 0) simulatedCooling.add(card.skill);
      let futureCastable = 0;
      (remainingQueue || []).forEach(queuedCard => {
        if (simulatedCooling.has(queuedCard.skill)) return;
        if (this.game.skills.estimate(unit, queuedCard, node).castable) futureCastable++;
        if (SKILL_DEFS[queuedCard.skill].cooldownTurns > 0) simulatedCooling.add(queuedCard.skill);
      });
      return Object.assign(node, {
        estimate: estimate,
        apCost: Math.ceil(node.d / CONFIG.MOVE_PER_ACTION_POINT),
        aoeFirst: ["selfAoe", "directionalDamage", "groundEnemyAoe", "groundVolley", "groundAllyAoe"].includes(def.kind),
        coverage: (estimate.plan.targets || []).length + (estimate.plan.allies || []).length,
        value: estimate.damage * W.DAMAGE + estimate.heal * W.HEAL +
          estimate.aoe * W.AOE_HIT + estimate.kills * W.KILL,
        hazard: this.isHostileZone(node, unit.team) ? 1 : 0,
        adjacent: this.adjacentEnemyCount(node, unit.team),
        threatCount: threat.count,
        threatDamage: threat.damage,
        targetDistance: estimate.targetDistance,
        futureCastable: futureCastable,
        terrainSafety: this.game.map.distanceToNearestDanger(node)
      });
    }
    compareCastPositions(a, b, isLastCard) {
      const safety = a.hazard - b.hazard ||
        a.adjacent - b.adjacent ||
        a.threatDamage - b.threatDamage ||
        a.threatCount - b.threatCount;
      if (safety) return safety;
      const targetQuality = a.aoeFirst
        ? b.coverage - a.coverage || b.estimate.kills - a.estimate.kills
        : b.estimate.kills - a.estimate.kills || b.coverage - a.coverage;
      if (targetQuality) return targetQuality;
      return b.value - a.value ||
        b.futureCastable - a.futureCastable ||
        (isLastCard ? b.apCost - a.apCost : a.apCost - b.apCost) ||
        b.targetDistance - a.targetDistance ||
        b.terrainSafety - a.terrainSafety ||
        a.d - b.d || a.y - b.y || a.x - b.x;
    }
    chooseCastPosition(unit, card, actionPoints, remainingQueue) {
      const maxSteps = Math.max(0, actionPoints) * CONFIG.MOVE_PER_ACTION_POINT;
      const isLastCard = !(remainingQueue && remainingQueue.length);
      if (!this.game.skills.hasPotentialTarget(unit, card)) return null;
      const candidates = this.game.map.reachable(unit, maxSteps)
        .map(node => {
          const estimate = this.game.skills.estimate(unit, card, node);
          if (!estimate.castable) return null;
          return this.castPositionRecord(unit, card, node, estimate, remainingQueue);
        })
        .filter(Boolean).sort((a, b) => this.compareCastPositions(a, b, isLastCard));
      if (candidates.length) return candidates[0];

      // 当前行动力内仍不能施法时，继续在整张可达地图寻找未来施法位，
      // 沿其路径走到本回合最远前缀；移动后仍超距才由卡牌流程弃置。
      if (!maxSteps) return null;
      const future = this.game.map.reachable(unit, CONFIG.MAP_COLS * CONFIG.MAP_ROWS)
        .map(node => {
          const estimate = this.game.skills.estimate(unit, card, node);
          if (!estimate.castable) return null;
          return this.castPositionRecord(unit, card, node, estimate, remainingQueue);
        }).filter(Boolean);
      if (!future.length) return null;
      const approachesByEnd = new Map();
      future.forEach(destination => {
        const furthest = Math.min(maxSteps, destination.path.length - 1);
        for (let steps = 1; steps <= furthest; steps++) {
          const prefix = destination.path.slice(0, steps + 1);
          const end = prefix[prefix.length - 1];
          const threat = this.enemyThreatSummary(end, unit.team, unit);
          const approach = {
            x: end.x, y: end.y, d: steps, path: prefix,
            apCost: Math.ceil(steps / CONFIG.MOVE_PER_ACTION_POINT),
            hazard: this.isHostileZone(end, unit.team) ? 1 : 0,
            adjacent: this.adjacentEnemyCount(end, unit.team),
            threatDamage: threat.damage,
            threatCount: threat.count,
            terrainSafety: this.game.map.distanceToNearestDanger(end),
            remaining: destination.d - steps,
            destination: destination
          };
          const key = keyOf(end.x, end.y);
          const previous = approachesByEnd.get(key);
          if (!previous || approach.remaining < previous.remaining ||
              (approach.remaining === previous.remaining && this.compareCastPositions(destination, previous.destination, isLastCard) < 0)) {
            approachesByEnd.set(key, approach);
          }
        }
      });
      const approaches = Array.from(approachesByEnd.values()).sort((a, b) =>
        a.hazard - b.hazard || a.adjacent - b.adjacent ||
        a.threatDamage - b.threatDamage || a.threatCount - b.threatCount ||
        this.compareCastPositions(a.destination, b.destination, isLastCard) ||
        a.remaining - b.remaining || b.terrainSafety - a.terrainSafety ||
        b.d - a.d || a.y - b.y || a.x - b.x
      );
      if (!approaches.length) return null;
      const chosen = approaches[0];
      return Object.assign({}, chosen, {
        approaching: true,
        futureDestination: { x: chosen.destination.x, y: chosen.destination.y }
      });
    }
    chooseEnemyMove(unit, target, maxSteps) {
      const steps = maxSteps === undefined ? CONFIG.ENEMY_MOVE : Math.max(0, maxSteps);
      const nodes = this.game.map.reachable(unit, steps);
      if (unit.type === "ranged") {
        const ideal = 4;
        return nodes.sort((a, b) => {
          const da = manhattan(a, target);
          const db = manhattan(b, target);
          const sa = (da <= unit.range ? 40 : 0) - Math.abs(da - ideal) * 6 - (this.game.map.isDanger(a.x, a.y) ? 20 : 0);
          const sb = (db <= unit.range ? 40 : 0) - Math.abs(db - ideal) * 6 - (this.game.map.isDanger(b.x, b.y) ? 20 : 0);
          return sb - sa || a.d - b.d || a.y - b.y || a.x - b.x;
        })[0];
      }
      return nodes.sort((a, b) =>
        manhattan(a, target) - manhattan(b, target) ||
        (this.game.map.isDanger(a.x, a.y) ? 1 : 0) - (this.game.map.isDanger(b.x, b.y) ? 1 : 0) ||
        a.d - b.d || a.y - b.y || a.x - b.x
      )[0];
    }
  }

  class BattleManager {
    constructor(game) {
      this.game = game;
      this.reset();
    }
    reset() {
      this.time = 0;
      this.running = false;
      this.speed = 1;
      this.sequence = [];
      this.currentStep = null;
      this.currentActor = null;
      this.stepping = false;
      this.gameOver = false;
      this.result = "";
      this.actionIndex = 0;
    }
    addStep(duration, onStart, onUpdate, onEnd, options) {
      const opts = options || {};
      this.sequence.push({
        duration: Math.max(1, duration || 1),
        elapsed: 0,
        onStart: onStart || null,
        onUpdate: onUpdate || null,
        onEnd: onEnd || null,
        started: false,
        visualBarrier: !!opts.visualBarrier,
        presented: false,
        label: opts.label || ""
      });
    }
    advanceTimeline() {
      const alive = this.game.units.filter(u => u.alive);
      if (!alive.length) return null;
      let delta = Infinity;
      alive.forEach(u => {
        delta = Math.min(delta, Math.max(0, CONFIG.ACTION_THRESHOLD - u.gauge) / u.speed);
      });
      if (!Number.isFinite(delta)) return null;
      this.time += delta;
      alive.forEach(u => u.gauge = Math.min(CONFIG.ACTION_THRESHOLD, u.gauge + u.speed * delta));
      this.game.map.purgeBurn(this.time);
      const ready = alive.filter(u => u.gauge >= CONFIG.ACTION_THRESHOLD - 0.0001)
        .sort((a, b) => (b.immediateAction ? 1 : 0) - (a.immediateAction ? 1 : 0) ||
          b.speed - a.speed || a.id.localeCompare(b.id));
      return ready[0] || null;
    }
    startNextAction() {
      if (this.gameOver || this.currentActor) return;
      const actor = this.advanceTimeline();
      if (!actor) return;
      this.currentActor = actor;
      actor.immediateAction = false;
      this.actionIndex++;
      actor.actionCount++;
      if (actor.team === "ally") actor.actionPoints = actor.maxActionPoints;
      this.game.map.focusOn(actor.x, actor.y, false);
      this.game.log(
        "▶ " + actor.name + " 获得行动机会" + (actor.team === "ally" ? " · 行动力 " + actor.actionPoints : ""),
        actor.team === "ally" ? "ally" : "enemy"
      );
      this.addStep(CONFIG.ANIMATION.INTRO);
      if (actor.skipTurns > 0) this.buildDisabledAction(actor);
      else if (actor.type === "summon") this.buildSummonAction(actor);
      else if (actor.team === "ally") this.buildAllyAction(actor);
      else this.buildEnemyAction(actor);
    }
    createMoveStep(unit, path, perCell) {
      if (!path || path.length <= 1) return;
      const duration = Math.max(80, (path.length - 1) * perCell);
      this.addStep(duration, step => {
        step.path = path.map(p => ({ x: p.x, y: p.y }));
        const end = step.path[step.path.length - 1];
        unit.x = end.x;
        unit.y = end.y;
        unit.renderX = step.path[0].x;
        unit.renderY = step.path[0].y;
        this.game.map.focusOn(end.x, end.y, false);
      }, (step, t) => {
        const segments = step.path.length - 1;
        const f = clamp(t, 0, 0.999999) * segments;
        const i = Math.min(segments - 1, Math.floor(f));
        const lt = ease(f - i);
        unit.renderX = lerp(step.path[i].x, step.path[i + 1].x, lt);
        unit.renderY = lerp(step.path[i].y, step.path[i + 1].y, lt);
      }, () => {
        unit.renderX = unit.x;
        unit.renderY = unit.y;
      });
    }
    createHandPreparationSteps(actor, operations) {
      const slotOf = (state, card) => {
        if (state.extra === card) return this.game.hand.handLimit(actor);
        return state.hand.indexOf(card);
      };
      const rectOf = (state, card) => {
        const slot = slotOf(state, card);
        if (slot < 0) throw new Error("手牌动画状态缺少卡牌 #" + card.id);
        return this.game.renderer.getHandSlotRect(slot, actor);
      };
      operations.forEach(operation => {
        if (operation.type === "draw") {
          this.addStep(CONFIG.ANIMATION.DRAW, () => {
            this.game.hand.applyState(actor, operation.before);
            this.game.renderer.actionCue = {
              type: "drawCard", actor: actor, card: operation.card,
              targetRect: rectOf(operation.after, operation.card), progress: 0
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(actor.name + " 抽到「" + SKILL_DEFS[operation.card.skill].name + "」", "draw");
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "drawCard" });
        }
        if (operation.type === "stash" || operation.type === "swapExtra") {
          this.addStep(CONFIG.ANIMATION.STASH, () => {
            this.game.hand.applyState(actor, operation.before);
            const beforeCards = this.game.hand.stateCards(operation.before);
            const afterCards = this.game.hand.stateCards(operation.after);
            const shiftCards = afterCards.filter(card =>
              beforeCards.includes(card) && card !== operation.card && card !== operation.outgoing &&
              slotOf(operation.before, card) !== slotOf(operation.after, card)
            ).map(card => ({
              card: card,
              fromRect: rectOf(operation.before, card),
              toRect: rectOf(operation.after, card),
              fromExtra: operation.before.extra === card,
              toExtra: operation.after.extra === card
            }));
            this.game.renderer.actionCue = {
              type: "stashCard", actor: actor, card: operation.card,
              originRect: rectOf(operation.before, operation.card),
              targetRect: rectOf(operation.after, operation.card),
              outgoing: operation.outgoing || null,
              outgoingOriginRect: operation.outgoing ? rectOf(operation.before, operation.outgoing) : null,
              outgoingTargetRect: operation.outgoing ? rectOf(operation.after, operation.outgoing) : null,
              shiftCards: shiftCards, progress: 0
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(
              SKILL_DEFS[operation.card.skill].name + " 冷却中 · " +
              (operation.outgoing ? "替换保留槽中的" + SKILL_DEFS[operation.outgoing.skill].name : "移入保留槽"),
              "cooldown"
            );
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "stashCard" });
        }
        if (operation.type === "sort") {
          this.addStep(CONFIG.ANIMATION.SORT_HAND, () => {
            this.game.hand.applyState(actor, operation.before);
            this.game.renderer.actionCue = {
              type: "sortHand", actor: actor, progress: 0,
              items: operation.cards.map(card => ({
                card: card,
                originRect: rectOf(operation.before, card),
                targetRect: rectOf(operation.after, card),
                fromExtra: operation.before.extra === card,
                toExtra: operation.after.extra === card
              }))
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(actor.name + " 手牌整理完成", "ai");
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "sortHand" });
        }
        if (operation.type === "merge") {
          this.addStep(CONFIG.ANIMATION.MERGE, () => {
            this.game.hand.applyState(actor, operation.before);
            const beforeCards = this.game.hand.stateCards(operation.before);
            const afterCards = this.game.hand.stateCards(operation.after);
            const shiftCards = afterCards.filter(card =>
              beforeCards.includes(card) && !operation.pair.includes(card) &&
              slotOf(operation.before, card) !== slotOf(operation.after, card)
            ).map(card => ({
              card: card,
              fromRect: rectOf(operation.before, card),
              toRect: rectOf(operation.after, card),
              fromExtra: operation.before.extra === card,
              toExtra: operation.after.extra === card
            }));
            this.game.renderer.actionCue = {
              type: "mergeCards", actor: actor, pair: operation.pair,
              merged: operation.merged,
              originRects: operation.pair.map(card => rectOf(operation.before, card)),
              originExtra: operation.pair.map(card => operation.before.extra === card),
              targetRect: rectOf(operation.after, operation.merged),
              targetExtra: operation.after.extra === operation.merged,
              shiftCards: shiftCards,
              progress: 0
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(
              SKILL_DEFS[operation.merged.skill].name + " 合成为 " + operation.merged.star + "★并放回手牌",
              "merge"
            );
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "mergeCards" });
        }
      });
    }
    createRemoteHandPreparationStep(actor, finalState, cardCount) {
      this.addStep(CONFIG.ANIMATION.REMOTE_DRAW, () => {
        this.game.hand.applyState(actor, finalState);
        // 行动提示出现前把已缓动中的镜头稳稳落到队友身上，避免气泡追着镜头漂移。
        this.game.map.focusOn(actor.x, actor.y, true);
        this.game.renderer.actionCue = {
          type: "remoteDraw", actor: actor, cardCount: cardCount, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue && this.game.renderer.actionCue.type === "remoteDraw") {
          this.game.renderer.actionCue.progress = t;
        }
      }, () => {
        this.game.log(actor.name + " 的远端手牌已同步 · " + cardCount + " 张", "draw");
        if (this.game.renderer.actionCue && this.game.renderer.actionCue.type === "remoteDraw") {
          this.game.renderer.actionCue = null;
        }
      }, { visualBarrier: true, label: "remoteDraw" });
    }
    createActionStartStep(actor, finalState, cardCount) {
      this.addStep(CONFIG.ANIMATION.ACTION_START, () => {
        this.game.hand.applyState(actor, finalState);
        this.game.renderer.actionCue = {
          type: "actionStart", actor: actor, cardCount: cardCount,
          actionPoints: actor.actionPoints, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, () => {
        this.game.log("▶ " + actor.name + " 开始行动", "ally");
        this.game.renderer.actionCue = null;
      }, { visualBarrier: true, label: "actionStart" });
    }
    createRepositionStep(actor, card, remainingQueue) {
      this.addStep(1, step => {
        step.path = null;
        step.visualBarrier = false;
        if (!actor.alive || actor.isCooling(card.skill)) return;
        const choice = this.game.ai.chooseCastPosition(actor, card, actor.actionPoints, remainingQueue || []);
        if (!choice) {
          if (this.game.skills.hasPotentialTarget(actor, card)) this.game.log(
            SKILL_DEFS[card.skill].name + (actor.actionPoints > 0 ? " 全图没有可到达的施法位置" : " 行动力已耗尽，无法调整站位"), "warn"
          );
          return;
        }
        if (!choice.path || choice.path.length <= 1) return;
        step.path = choice.path.map(p => ({ x: p.x, y: p.y }));
        step.duration = Math.max(100, (step.path.length - 1) * CONFIG.ANIMATION.MOVE_PER_CELL);
        step.visualBarrier = true;
        actor.actionPoints = Math.max(0, actor.actionPoints - choice.apCost);
        const end = step.path[step.path.length - 1];
        actor.x = end.x;
        actor.y = end.y;
        actor.renderX = step.path[0].x;
        actor.renderY = step.path[0].y;
        this.game.map.focusOn(end.x, end.y, false);
        this.game.log(
          actor.name + (choice.approaching ? " 为接近未来施法位" : " 为安全施放「" + SKILL_DEFS[card.skill].name + "」") + "移动 " + (step.path.length - 1) +
          " 格，消耗 " + choice.apCost + " 行动力（剩余 " + actor.actionPoints + "）",
          "ai"
        );
      }, (step, t) => {
        if (!step.path || step.path.length < 2) return;
        const segments = step.path.length - 1;
        const f = clamp(t, 0, .999999) * segments;
        const i = Math.min(segments - 1, Math.floor(f));
        const lt = ease(f - i);
        actor.renderX = lerp(step.path[i].x, step.path[i + 1].x, lt);
        actor.renderY = lerp(step.path[i].y, step.path[i + 1].y, lt);
      }, step => {
        if (step.path) {
          actor.renderX = actor.x;
          actor.renderY = actor.y;
        }
      }, { label: "reposition" });
    }
    createCardStep(actor, card) {
      const flow = {
        actor: actor,
        card: card,
        valid: false,
        target: null,
        aimCell: null,
        originRect: null,
        result: null,
        resolved: false,
        effectStarted: false,
        impactAt: .5,
        reason: ""
      };
      const cancelRemaining = step => {
        step.duration = 1;
        step.visualBarrier = false;
      };
      const resolveImpact = () => {
        if (!flow.valid || flow.resolved) return;
        flow.resolved = true;
        flow.result = this.game.skills.cast(actor, card, flow.target);
        this.game.skills.playResolveEffect(actor, card, flow.target);
        const cd = SKILL_DEFS[card.skill].cooldownTurns;
        actor.setCooldown(card.skill, cd);
        if (this.game.renderer.actionCue && this.game.renderer.actionCue.type === "impact") {
          this.game.renderer.actionCue.result = flow.result;
        }
      };

      this.addStep(CONFIG.ANIMATION.CARD_FLY, step => {
        if (!actor.alive) {
          this.game.hand.removeCard(actor, card);
          flow.reason = "施法者已离场";
          cancelRemaining(step);
          return;
        }
        if (actor.isCooling(card.skill)) {
          const left = actor.cooldownLeft(card.skill);
          this.game.log(SKILL_DEFS[card.skill].name + " 冷却中，保留 · 剩余 " + left + " 个自身回合", "cooldown");
          flow.reason = "冷却 " + left + " 回合";
          this.game.renderer.actionCue = {
            type: "skip", actor: actor, card: card, progress: 0, reason: flow.reason
          };
          step.duration = CONFIG.ANIMATION.SKIP;
          return;
        }
        const target = this.game.skills.findTarget(actor, card);
        if (!target) {
          this.game.hand.removeCard(actor, card);
          const stillPotential = this.game.skills.hasPotentialTarget(actor, card);
          this.game.log(
            SKILL_DEFS[card.skill].name + (stillPotential ? " 已尝试移动，仍没有合法目标，弃置" : " 当前不存在可作用的目标，弃置"),
            "warn"
          );
          flow.reason = stillPotential ? "移动后仍无目标" : "没有可作用目标";
          this.game.renderer.actionCue = {
            type: "skip", actor: actor, card: card, progress: 0, reason: flow.reason
          };
          step.duration = CONFIG.ANIMATION.SKIP;
          return;
        }
        flow.valid = true;
        flow.target = target;
        flow.aimCell = target.cell ? { x: target.cell.x, y: target.cell.y } : { x: target.x, y: target.y };
        flow.originRect = this.game.isProtagonist(actor)
          ? this.game.renderer.getCardRect(card.id)
          : this.game.renderer.getRemoteCardOrigin(actor);
        this.game.hand.removeCard(actor, card);
        this.game.renderer.actionCue = {
          type: "cardFly", actor: actor, card: card, target: target,
          aimCell: flow.aimCell, originRect: flow.originRect, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, () => {
        if (!flow.valid) this.game.renderer.actionCue = null;
      }, { visualBarrier: true, label: "cardFly" });

      this.addStep(CONFIG.ANIMATION.WINDUP, step => {
        if (!flow.valid) return cancelRemaining(step);
        this.game.renderer.showSkillBanner(actor, card);
        this.game.renderer.actionCue = {
          type: "windup", actor: actor, card: card, target: flow.target,
          aimCell: flow.aimCell, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, null, { visualBarrier: true, label: "windup" });

      this.addStep(CONFIG.ANIMATION.CAST, step => {
        if (!flow.valid) return cancelRemaining(step);
        flow.impactAt = this.game.skills.impactMoment(card.skill);
        if (!flow.effectStarted) {
          flow.effectStarted = true;
          this.game.skills.playCastEffect(actor, card, flow.target);
        }
        this.game.renderer.actionCue = {
          type: "impact", actor: actor, card: card, target: flow.target,
          aimCell: flow.aimCell, result: flow.result, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
        if (t >= flow.impactAt) resolveImpact();
        const motion = flow.result && flow.result.motion;
        if (!motion || !motion.path || motion.path.length < 2) return;
        const segments = motion.path.length - 1;
        const motionT = clamp((t - flow.impactAt) / Math.max(.001, 1 - flow.impactAt), 0, 0.999999);
        const f = motionT * segments;
        const i = Math.min(segments - 1, Math.floor(f));
        const lt = ease(f - i);
        motion.unit.renderX = lerp(motion.path[i].x, motion.path[i + 1].x, lt);
        motion.unit.renderY = lerp(motion.path[i].y, motion.path[i + 1].y, lt);
      }, () => {
        resolveImpact();
        const motion = flow.result && flow.result.motion;
        if (motion) {
          motion.unit.renderX = motion.unit.x;
          motion.unit.renderY = motion.unit.y;
        }
      }, { visualBarrier: true, label: "impact" });

      this.addStep(CONFIG.ANIMATION.SETTLE, step => {
        if (!flow.valid) return cancelRemaining(step);
        this.game.renderer.actionCue = {
          type: "settle", actor: actor, card: card, target: flow.target,
          aimCell: flow.aimCell, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, () => {
        this.game.renderer.actionCue = null;
      }, { visualBarrier: true, label: "settle" });
    }
    buildAllyAction(actor) {
      const prep = this.game.hand.planAction(actor);
      this.game.log(
        actor.name + " 已装配 " + actor.skillBar.length + " 个技能 · 普通手牌上限 " + prep.handLimit,
        "muted"
      );
      if (this.game.isProtagonist(actor)) {
        this.createHandPreparationSteps(actor, prep.operations);
      } else {
        this.createRemoteHandPreparationStep(actor, prep.finalState, prep.queue.length);
      }
      this.createActionStartStep(actor, prep.finalState, prep.queue.length);
      prep.queue.forEach((card, index) => {
        this.createRepositionStep(actor, card, prep.queue.slice(index + 1));
        this.createCardStep(actor, card);
      });
      this.addEndTileStep(actor);
    }
    nearestTarget(unit) {
      const targets = this.game.units.filter(u => u.alive && u.team !== unit.team);
      return targets.sort((a, b) => manhattan(unit, a) - manhattan(unit, b) || a.id.localeCompare(b.id))[0] || null;
    }
    buildEnemyAction(actor) {
      const target = this.nearestTarget(actor);
      if (!target) {
        this.addStep(80);
        return;
      }
      const moveSteps = actor.rootTurns > 0 ? 0 : actor.slowTurns > 0 ? Math.max(0, CONFIG.ENEMY_MOVE - 1) : CONFIG.ENEMY_MOVE;
      const move = this.game.ai.chooseEnemyMove(actor, target, moveSteps);
      this.game.log(actor.name + (actor.rootTurns > 0 ? " 被定身，无法移动" : actor.slowTurns > 0 ? " 受减速影响向 " + target.name + " 移动" : " 向 " + target.name + " 移动"), "enemy");
      this.createMoveStep(actor, move.path, CONFIG.ANIMATION.MOVE_PER_CELL);
      this.addStep(CONFIG.ANIMATION.ATTACK, step => {
        if (!actor.alive) return;
        const newTarget = this.nearestTarget(actor);
        if (!newTarget || manhattan(actor, newTarget) > actor.range) {
          this.game.log(actor.name + " 未进入攻击范围", "muted");
          return;
        }
        this.game.applyDamage(actor, newTarget, actor.attack, actor.type === "ranged" ? "远射" : "攻击");
        if (actor.type === "ranged") {
          this.game.renderer.addEffect("projectile", {
            from: { x: actor.x, y: actor.y },
            to: { x: newTarget.x, y: newTarget.y },
            color: "#ef8b92",
            shape: "thorn"
          }, 340);
        } else {
          this.game.renderer.addEffect("slash", { x: newTarget.x, y: newTarget.y, color: "#ef7580" }, 300);
        }
        this.game.log(actor.name + " 攻击 " + newTarget.name, "enemy");
      });
      this.addEndTileStep(actor);
    }
    buildSummonAction(actor) {
      const target = this.nearestTarget(actor);
      if (!target) {
        this.addStep(80);
        return;
      }
      const moveSteps = actor.rootTurns > 0 ? 0 : actor.slowTurns > 0 ? 1 : CONFIG.ENEMY_MOVE;
      const move = this.game.ai.chooseEnemyMove(actor, target, moveSteps);
      this.game.log(actor.name + " 执行召唤物行动（剩余 " + actor.summonTurns + " 回合）", "ally");
      this.createMoveStep(actor, move.path, CONFIG.ANIMATION.MOVE_PER_CELL);
      this.addStep(CONFIG.ANIMATION.ATTACK, () => {
        if (!actor.alive) return;
        const newTarget = this.nearestTarget(actor);
        if (!newTarget || manhattan(actor, newTarget) > actor.range) {
          this.game.log(actor.name + " 未进入攻击范围", "muted");
          return;
        }
        this.game.applyDamage(actor, newTarget, actor.attack, "石酋重击");
        this.game.renderer.addEffect("sunder", {
          x: newTarget.x, y: newTarget.y, from: { x: actor.x, y: actor.y }, color: actor.color, star: 1
        }, 520);
      });
      this.addEndTileStep(actor);
    }
    buildDisabledAction(actor) {
      this.addStep(CONFIG.ANIMATION.ACTION_START, () => {
        this.game.renderer.addFloat(actor.x, actor.y, "无法行动", "#8fd2e8");
        this.game.log(actor.name + " 处于冰冻/浮空状态，本回合无法行动", actor.team === "ally" ? "warn" : "enemy");
      }, null, null, { visualBarrier: true, label: "disabled" });
      this.addEndTileStep(actor);
    }
    addEndTileStep(actor) {
      this.addStep(CONFIG.ANIMATION.END_TILE, () => {
        if (!actor.alive) return;
        if (this.game.map.isDanger(actor.x, actor.y)) {
          this.game.applyDamage(null, actor, CONFIG.HAZARD_DAMAGE, "危险格");
        }
        const burn = this.game.map.burnZones.find(z =>
          z.x === actor.x && z.y === actor.y && z.team !== actor.team && z.expiresAt > this.time
        );
        if (burn && actor.alive) {
          this.game.applyDamage(null, actor, CONFIG.BURN_DAMAGE, "燃烧");
        }
      });
    }
    finishAction() {
      const actor = this.currentActor;
      if (!actor) return;
      actor.gauge = 0;
      if (actor.team === "ally") {
        actor.finishOwnTurnCooldowns();
        if (actor.type !== "summon") this.game.hand.normalizeAfterAction(actor);
      }
      actor.finishOwnTurnStatuses(this.game);
      this.currentActor = null;
      this.game.assertState();
      this.checkVictory();
      if (this.stepping) this.stepping = false;
    }
    checkVictory() {
      // 双方召唤物都不能代替基础角色维持战斗；本体全部阵亡时立即结算。
      const alliesAlive = this.game.units.some(u => u.alive && u.team === "ally" && u.type !== "summon");
      const enemiesAlive = this.game.units.some(u => u.alive && u.team === "enemy" && u.type !== "summon");
      if (alliesAlive && enemiesAlive) return false;
      this.gameOver = true;
      this.running = false;
      this.stepping = false;
      this.result = enemiesAlive ? "战斗失败" : "战斗胜利";
      this.game.log("✦ " + this.result, enemiesAlive ? "warn" : "victory");
      document.getElementById("live").textContent = this.result;
      return true;
    }
    update(dt) {
      if (this.gameOver) return;
      const active = this.running || this.stepping;
      if (!active) return;
      let budget = Math.min(dt, 50) * this.speed;
      let safety = 0;
      while (safety++ < 50) {
        if (!this.currentStep) {
          if (this.sequence.length) {
            this.currentStep = this.sequence.shift();
            this.currentStep.elapsed = 0;
            this.currentStep.started = true;
            if (this.currentStep.onStart) this.currentStep.onStart(this.currentStep);
          } else if (this.currentActor) {
            this.finishAction();
            if (!this.running && !this.stepping) return;
            continue;
          } else {
            if (!this.running && !this.stepping) return;
            this.startNextAction();
            if (!this.currentActor) return;
            continue;
          }
        }
        const step = this.currentStep;
        if (step.visualBarrier && !step.presented) {
          step.presented = true;
          if (step.onUpdate) step.onUpdate(step, 0);
          return;
        }
        const remaining = step.duration - step.elapsed;
        const advance = Math.min(Math.max(0, budget), remaining);
        step.elapsed += advance;
        budget -= advance;
        if (step.onUpdate) step.onUpdate(step, clamp(step.elapsed / step.duration, 0, 1));
        if (step.elapsed >= step.duration - 0.001) {
          if (step.onEnd) step.onEnd(step);
          this.currentStep = null;
          if (step.visualBarrier) return;
          if (budget <= 0) return;
          continue;
        }
        return;
      }
