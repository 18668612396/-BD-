            ctx.lineWidth = (lane ? 2 : 5) * s;
            ctx.beginPath();
            d.path.forEach((node, i) => {
              const p = this.game.map.worldToScreen(node.x, node.y);
              if (!i) ctx.moveTo(p.x + lane * 5 * s, p.y); else ctx.lineTo(p.x + lane * 5 * s, p.y);
            });
            ctx.stroke();
          }
          const hit = this.game.map.worldToScreen(d.target.x, d.target.y);
          ctx.lineWidth = 4 * s;
          ctx.beginPath();
          ctx.arc(hit.x, hit.y, (10 + t * 25) * s, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        if (e.type === "rapid") {
          const from = this.game.map.worldToScreen(d.from.x, d.from.y);
          const s = CONFIG.CELL / 38;
          ctx.save();
          ctx.shadowColor = d.color;
          ctx.shadowBlur = 10 * s;
          for (let i = 0; i < d.hits; i++) {
            const destination = d.tos && d.tos.length ? d.tos[i % d.tos.length] : d.to;
            const to = this.game.map.worldToScreen(destination.x, destination.y);
            const stagger = Math.min(.13, .6 / Math.max(1, d.hits - 1));
            const local = clamp((t - i * stagger) / .4, 0, 1);
            if (local <= 0 || local >= 1) continue;
            const q = ease(local);
            const side = (i - (d.hits - 1) / 2) * 4 * s;
            const x = lerp(from.x, to.x, q) + side;
            const y = lerp(from.y, to.y, q) - Math.sin(q * Math.PI) * (7 + i * 2) * s;
            ctx.globalAlpha = Math.sin(local * Math.PI);
            ctx.strokeStyle = d.color;
            ctx.lineWidth = 3 * s;
            ctx.beginPath();
            ctx.moveTo(lerp(from.x, to.x, Math.max(0, q - .12)) + side, lerp(from.y, to.y, Math.max(0, q - .12)));
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.fillStyle = "#fff3a2";
            ctx.beginPath();
            ctx.arc(x, y, 3.5 * s, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
        if (e.type === "float") {
          const p = this.game.map.worldToScreen(d.x, d.y);
          ctx.save();
          ctx.globalAlpha = Math.sin(Math.min(1, t) * Math.PI);
          ctx.font = "700 11px \"PingFang SC\",\"Microsoft YaHei\",sans-serif";
          ctx.textAlign = "center";
          ctx.lineWidth = 3;
          ctx.strokeStyle = "rgba(255,255,255,.9)";
          ctx.strokeText(d.text, p.x, p.y - 14 - t * 22);
          ctx.fillStyle = d.color;
          ctx.fillText(d.text, p.x, p.y - 14 - t * 22);
          ctx.restore();
        }
      });
    }
    drawActionWorldCue() {
      const cue = this.actionCue;
      if (!cue) return;
      if (cue.type === "remoteDraw") {
        const ctx = this.ctx;
        const t = clamp(cue.progress || 0, 0, 1);
        const p = this.game.map.worldToScreen(cue.actor.renderX, cue.actor.renderY);
        const s = clamp(CONFIG.CELL / 38, .78, 1.65);
        const alpha = Math.min(clamp(t / .14, 0, 1), clamp((1 - t) / .16, 0, 1));
        const bob = Math.sin(this.clock / 125) * 2.2 * s;
        const dots = ["·", "··", "···"][Math.floor(this.clock / 280) % 3];
        const w = 90 * s;
        const h = 27 * s;
        const x = clamp(p.x - w / 2, CONFIG.FIELD_X + 5, CONFIG.FIELD_X + CONFIG.FIELD_W - w - 5);
        const preferredY = p.y - 66 * s + bob;
        const minY = CONFIG.FIELD_Y + 5;
        const maxY = CONFIG.FIELD_Y + CONFIG.FIELD_H - h - 5;
        const belowActor = preferredY < minY;
        const y = belowActor
          ? clamp(p.y + 34 * s + bob, minY, maxY)
          : clamp(preferredY, minY, maxY);

        ctx.shadowBlur = 13 * s;

        ctx.strokeStyle = "#65d2ae";
        ctx.lineWidth = 1.5 * s;
        ctx.stroke();

          const cy = y + h / 2 + (i - 1) * .7 * s;

          ctx.translate(cx, cy);
          ctx.rotate((i - 1) * .16 + Math.sin(this.clock / 180 + i) * .035);

        }

        ctx.fillStyle = "rgba(7,13,14,.94)";
        ctx.beginPath();
        if (belowActor) {
          ctx.moveTo(p.x - 5 * s, y + 1);
          ctx.lineTo(p.x + 5 * s, y + 1);
          ctx.lineTo(p.x, y - 7 * s);
        } else {
          ctx.moveTo(p.x - 5 * s, y + h - 1);
          ctx.lineTo(p.x + 5 * s, y + h - 1);
          ctx.lineTo(p.x, y + h + 7 * s);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        return;
      }
      if (!cue.aimCell || !["windup", "impact", "settle"].includes(cue.type)) return;
      const ctx = this.ctx;
      const t = clamp(cue.progress || 0, 0, 1);
      const def = SKILL_DEFS[cue.card.skill];
      const target = this.game.map.worldToScreen(cue.aimCell.x, cue.aimCell.y);
      const actor = this.game.map.worldToScreen(cue.actor.renderX, cue.actor.renderY);
      const s = CONFIG.CELL / 38;
      ctx.save();
      const alpha = cue.type === "settle" ? 1 - t : cue.type === "impact" ? 1 - t * .72 : .45 + t * .55;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = def.color;
      ctx.fillStyle = def.color;
      ctx.shadowColor = def.color;
      ctx.shadowBlur = 15 * s;
      ctx.lineCap = "round";
      ctx.lineWidth = 2.5 * s;
      ctx.beginPath();
      ctx.arc(actor.x, actor.y, (17 + Math.sin(t * Math.PI) * 8) * s, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([7 * s, 6 * s]);
      ctx.lineDashOffset = -t * 28 * s;
      ctx.beginPath();
      ctx.arc(target.x, target.y, (19 + (1 - t) * 11) * s, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      const plan = cue.target;
      if (plan && plan.affectedCells) {
        ctx.shadowBlur = 7 * s;
        plan.affectedCells.forEach(cell => {
          const p = this.game.map.worldToScreen(cell.x, cell.y);
          ctx.globalAlpha = alpha * .30;
          ctx.fillStyle = def.color;
          ctx.fillRect(p.x - CONFIG.CELL / 2 + 2, p.y - CONFIG.CELL / 2 + 2, CONFIG.CELL - 4, CONFIG.CELL - 4);
          ctx.globalAlpha = alpha * .70;
          ctx.strokeRect(p.x - CONFIG.CELL / 2 + 3, p.y - CONFIG.CELL / 2 + 3, CONFIG.CELL - 6, CONFIG.CELL - 6);
        });
      }
      const primary = plan && (plan.primary || plan.targets && plan.targets[0] || plan.allies && plan.allies[0]);
      if (primary && def.kind !== "selfAoe") {
        const primaryPoint = this.game.map.worldToScreen(primary.renderX, primary.renderY);
        ctx.globalAlpha = alpha * .72;
        ctx.beginPath();
        ctx.moveTo(actor.x, actor.y);
        ctx.lineTo(primaryPoint.x, primaryPoint.y);

      if (cue.card.skill === "healing_spell") {
        ctx.globalAlpha = alpha;
        ctx.fillRect(target.x - 3 * s, target.y - 18 * s, 6 * s, 36 * s);

      grad.addColorStop(0, "rgba(6,9,10,0)");

      grad.addColorStop(1, "rgba(6,9,10,.82)");

      }
      if (this.actionCue && this.actionCue.type === "stashCard") {
        hidden.add(this.actionCue.card.id);
        if (this.actionCue.outgoing) hidden.add(this.actionCue.outgoing.id);
        (this.actionCue.shiftCards || []).forEach(item => hidden.add(item.card.id));
      }
      if (this.actionCue && this.actionCue.type === "sortHand") {
        (this.actionCue.items || []).forEach(item => hidden.add(item.card.id));
      }
      for (let i = 0; i < g.limit; i++) {
        const card = owner && owner.hand[i];

        if (card) this.cardRects.set(card.id, r);
        const isHidden = !!card && hidden.has(card.id);

    drawActionOverlay() {
      const cue = this.actionCue;
      if (!cue) return;
      const ctx = this.ctx;
      const f = this.layout.field;
      const t = clamp(cue.progress || 0, 0, 1);
      const drawFloatingCard = (card, x, y, w, h, rotation, alpha, extra) => {
        ctx.save();
        ctx.globalAlpha = alpha === undefined ? 1 : alpha;
        ctx.translate(x, y);
        ctx.rotate(rotation || 0);
        this.drawCard(card, -w / 2, -h / 2, w, h, !!extra, cue.actor, false, true);
        ctx.restore();
      };
      if (cue.type === "actionStart") {
        const alpha = Math.sin(t * Math.PI);
        const enter = ease(clamp(t / .28, 0, 1));
        const w = Math.min(f.w - 34, this.layout.desktop ? 360 : 270);
        const h = this.layout.desktop ? 92 : 72;
        const x = f.x + (f.w - w) / 2;
        const y = f.y + f.h * .24 - h / 2;
        const scale = .86 + enter * .14;
        const drawW = w * scale;
        const drawH = h * scale;
        const drawX = x + (w - drawW) / 2;
        const drawY = y + (h - drawH) / 2;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(8,12,13,.92)";
        roundRect(ctx, drawX, drawY, drawW, drawH, drawH / 2);
        ctx.fill();
        ctx.strokeStyle = cue.actor.color;
        ctx.lineWidth = 2;
        ctx.stroke();
        this.text(cue.actor.name + " · 开始行动", x + w / 2, y + h * .42, (this.layout.desktop ? 23 : 17) * scale, "#fff0d2", "center", 900);
        this.text("行动力 " + cue.actionPoints + "  ·  手牌 " + cue.cardCount + " 张", x + w / 2, y + h * .70, (this.layout.desktop ? 12 : 10) * scale, "#9ed6bd", "center", 700);
        ctx.restore();
        return;
      }
      if (cue.type === "sortHand") {
        const items = cue.items || [];
        if (!items.length) return;
        const centerX = f.x + f.w / 2;
        const centerY = this.layout.handY + items[0].originRect.h * .44;
        const gather = ease(clamp(t / .42, 0, 1));
        const scatter = ease(clamp((t - .56) / .44, 0, 1));
        items.forEach((item, i) => {
          const from = item.originRect;
          const to = item.targetRect;
          const orderOffset = i - (items.length - 1) / 2;
          const stackX = centerX + orderOffset * (this.layout.desktop ? 3.2 : 2.1);
          const stackY = centerY + Math.abs(orderOffset) * (this.layout.desktop ? 1.5 : 1);
          let x;
          let y;
          let rotation;
          if (t < .42) {
            x = lerp(from.x + from.w / 2, stackX, gather);
            y = lerp(from.y + from.h / 2, stackY, gather) - Math.sin(gather * Math.PI) * (this.layout.desktop ? 28 : 18);
            rotation = lerp(orderOffset * .025, orderOffset * .012, gather);
          } else if (t < .56) {
            x = stackX;
            y = stackY;
            rotation = orderOffset * .012;
          } else {
            x = lerp(stackX, to.x + to.w / 2, scatter);
            y = lerp(stackY, to.y + to.h / 2, scatter) - Math.sin(scatter * Math.PI) * (this.layout.desktop ? 24 : 16);
            rotation = lerp(orderOffset * .012, 0, scatter);
          }
          drawFloatingCard(item.card, x, y, to.w, to.h, rotation, 1, scatter > .5 ? item.toExtra : item.fromExtra);
        });
        ctx.save();
        ctx.globalAlpha = Math.sin(t * Math.PI);
        this.text("手牌整理", centerX, this.layout.handY - (this.layout.desktop ? 50 : 36), this.layout.desktop ? 16 : 11, "#f5df9d", "center", 850);
        ctx.restore();
        return;
      }
      const visualCard = cue.card || cue.merged;
      if (!visualCard) return;
      const def = SKILL_DEFS[visualCard.skill];
      if (cue.type === "drawCard") {
        const r = cue.targetRect;
        const sx = f.x + f.w - (this.layout.desktop ? 28 : 18);
        const sy = this.layout.handY - (this.layout.desktop ? 48 : 35);
        const ex = r.x + r.w / 2;
        const ey = r.y + r.h / 2;
        const q = ease(t);
        const x = lerp(sx, ex, q);
        const y = lerp(sy, ey, q) - Math.sin(q * Math.PI) * (this.layout.desktop ? 74 : 48);
        const scale = .62 + q * .38;
        ctx.save();
        ctx.strokeStyle = def.color;
        ctx.globalAlpha = .7 * (1 - t);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo((sx + ex) / 2, Math.min(sy, ey) - 65, x, y);
        ctx.stroke();
        ctx.restore();
        drawFloatingCard(cue.card, x, y, r.w * scale, r.h * scale, (1 - q) * .22, 1);
        this.text("补充手牌 · " + def.name, f.x + f.w / 2, this.layout.handY - (this.layout.desktop ? 82 : 62), this.layout.desktop ? 14 : 10, "#f4e7ca", "center", 800);
        return;
      }
      if (cue.type === "stashCard") {
        const from = cue.originRect;
        const to = cue.targetRect;
        const q = ease(t);
        const x = lerp(from.x + from.w / 2, to.x + to.w / 2, q);
        const y = lerp(from.y + from.h / 2, to.y + to.h / 2, q) - Math.sin(q * Math.PI) * (this.layout.desktop ? 38 : 25);
        drawFloatingCard(cue.card, x, y, to.w, to.h, (1 - q) * -.08, 1, q >= .5);
        if (cue.outgoing) {
          const outgoingFrom = cue.outgoingOriginRect;
          const outgoingTo = cue.outgoingTargetRect;
          const ox = lerp(outgoingFrom.x + outgoingFrom.w / 2, outgoingTo.x + outgoingTo.w / 2, q);
          const oy = lerp(outgoingFrom.y + outgoingFrom.h / 2, outgoingTo.y + outgoingTo.h / 2, q) + Math.sin(q * Math.PI) * (this.layout.desktop ? 28 : 18);
          drawFloatingCard(cue.outgoing, ox, oy, outgoingTo.w, outgoingTo.h, (1 - q) * .08, 1, q < .5);
        }
        const shiftQ = ease(clamp((t - .18) / .82, 0, 1));
        (cue.shiftCards || []).forEach((item, i) => {
          const sx = lerp(item.fromRect.x + item.fromRect.w / 2, item.toRect.x + item.toRect.w / 2, shiftQ);
          const sy = lerp(item.fromRect.y + item.fromRect.h / 2, item.toRect.y + item.toRect.h / 2, shiftQ) - Math.sin(shiftQ * Math.PI) * (this.layout.desktop ? 10 : 7);
          drawFloatingCard(item.card, sx, sy, item.toRect.w, item.toRect.h, (1 - shiftQ) * (i % 2 ? .02 : -.02), 1, item.toExtra);
        });
        ctx.save();
        ctx.globalAlpha = Math.sin(t * Math.PI);
        this.text(
          cue.outgoing ? def.name + " 优先保留 · 调整冷却槽" : def.name + " 冷却中 · 移入保留槽",
          f.x + f.w / 2, this.layout.handY - (this.layout.desktop ? 58 : 42),
          this.layout.desktop ? 14 : 10, "#e7cc79", "center", 820
        );
        ctx.restore();
        return;
      }
      if (cue.type === "mergeCards") {
        const origins = cue.originRects;
        const target = cue.targetRect;
        const cx = f.x + f.w / 2;
        const cy = this.layout.handY - (this.layout.desktop ? 82 : 62);
        const collide = ease(clamp(t / .48, 0, 1));
        if (t < .56) {
          origins.forEach((r, i) => {
            const sx = r.x + r.w / 2;
            const sy = r.y + r.h / 2;
            const spread = (i ? 1 : -1) * (1 - collide) * (this.layout.desktop ? 12 : 8);
            const x = lerp(sx, cx, collide) + spread;
            const y = lerp(sy, cy, collide) - Math.sin(collide * Math.PI) * (this.layout.desktop ? 34 : 22);
            const scale = 1 - collide * .16;
            drawFloatingCard(cue.pair[i], x, y, r.w * scale, r.h * scale, (i ? 1 : -1) * (1 - collide) * .18, 1 - clamp((t - .48) / .08, 0, 1), cue.originExtra && cue.originExtra[i]);
          });
        }
        const flash = 1 - clamp(Math.abs(t - .54) / .10, 0, 1);
        if (flash > 0) {
          ctx.save();
          ctx.globalAlpha = flash;
          ctx.fillStyle = "#fff3b1";
          ctx.shadowColor = def.color;
          ctx.shadowBlur = 32;
          ctx.beginPath();
          ctx.arc(cx, cy, (12 + flash * 25), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        if (t >= .52) {
          const q = ease(clamp((t - .52) / .48, 0, 1));
          const ex = target.x + target.w / 2;
          const ey = target.y + target.h / 2;
          const x = lerp(cx, ex, q);
          const y = lerp(cy, ey, q) - Math.sin(q * Math.PI) * (this.layout.desktop ? 34 : 22);
          const scale = .78 + q * .22;
          drawFloatingCard(cue.merged, x, y, target.w * scale, target.h * scale, (1 - q) * -.12, clamp((t - .52) / .10, 0, 1), cue.targetExtra);
        }
        const shiftQ = ease(clamp((t - .60) / .40, 0, 1));
        (cue.shiftCards || []).forEach((item, i) => {
          const from = item.fromRect;
          const to = item.toRect;
          const x = lerp(from.x + from.w / 2, to.x + to.w / 2, shiftQ);
          const y = lerp(from.y + from.h / 2, to.y + to.h / 2, shiftQ) - Math.sin(shiftQ * Math.PI) * (this.layout.desktop ? 12 : 8);
          drawFloatingCard(item.card, x, y, to.w, to.h, (1 - shiftQ) * (i % 2 ? .025 : -.025), 1, shiftQ > .5 ? item.toExtra : item.fromExtra);
        });
        const bannerAlpha = Math.sin(t * Math.PI);
        ctx.save();
        ctx.globalAlpha = bannerAlpha;
        this.text(def.name + "  ★" + cue.pair[0].star + " + ★" + cue.pair[1].star + "  →  " + "★".repeat(cue.merged.star), cx, cy - (this.layout.desktop ? 72 : 53), this.layout.desktop ? 16 : 11, "#ffe29a", "center", 850);
        ctx.restore();
        return;
      }
      if (cue.type === "cardFly") {
        const r = cue.originRect || this.getCardRect(cue.card.id);
        const aim = this.game.map.worldToScreen(cue.aimCell.x, cue.aimCell.y);
        const sx = r.x + r.w / 2;
        const sy = r.y + r.h / 2;
        const ex = clamp(aim.x, f.x + 16, f.x + f.w - 16);
        const ey = clamp(aim.y, f.y + 18, f.y + f.h - 18);
        const q = ease(t);
        const cx = (sx + ex) / 2;
        const cy = Math.min(sy, ey) - (this.layout.desktop ? 105 : 68);
        const inv = 1 - q;
        const x = inv * inv * sx + 2 * inv * q * cx + q * q * ex;
        const y = inv * inv * sy + 2 * inv * q * cy + q * q * ey;
        const scale = 1 - q * .72;
        ctx.save();
        ctx.globalAlpha = 1 - clamp((t - .88) / .12, 0, 1);
        ctx.strokeStyle = def.color;
        ctx.shadowColor = def.color;
        ctx.shadowBlur = 16;
        ctx.lineWidth = this.layout.desktop ? 5 : 3;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(lerp(sx, x, .72), lerp(sy, y, .72));
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.translate(x, y);
        ctx.rotate((q - .5) * .26);
        this.drawCard(cue.card, -r.w * scale / 2, -r.h * scale / 2, r.w * scale, r.h * scale, cue.card.inExtra, cue.actor);
        ctx.restore();
        return;
      }
      if (cue.type === "skip") {
        const alpha = Math.sin(t * Math.PI);
        const w = this.layout.desktop ? 260 : 210;
        const x = f.x + (f.w - w) / 2;
        const y = this.layout.handY - 38;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(8,11,12,.88)";
        roundRect(ctx, x, y, w, 38, 19);
        ctx.fill();
        ctx.strokeStyle = "#9b9484";
        ctx.stroke();
        this.text(def.name + " · " + cue.reason, x + w / 2, y + 19, this.layout.desktop ? 12 : 10, "#d5d0c4", "center", 700);
        ctx.restore();
      }
    }
    drawSkillBanners() {
      if (!this.skillBanners.length) return;
      const ctx = this.ctx;
      const f = this.layout.field;
      const visible = this.skillBanners.slice(-3).reverse();

        const alpha = Math.min(clamp(banner.age / 140, 0, 1), clamp(remaining / 180, 0, 1));
        if (alpha <= 0) return;
        const w = Math.min(f.w - 44, this.layout.desktop ? 390 : 280);
        const h = this.layout.desktop ? 76 : 62;
        const x = f.x + (f.w - w) / 2;

        const y = this.layout.handY - handGap - h - index * (h + 6);

        ctx.save();
        ctx.globalAlpha = alpha * (1 - index * .10);
        ctx.translate(0, (1 - enter) * -10);
        ctx.shadowColor = def.color;
        ctx.shadowBlur = 22;
        ctx.fillStyle = "rgba(7,10,11,.92)";
        roundRect(ctx, x, y, w, h, h / 2);
        ctx.fill();
        ctx.shadowColor = "transparent";
        ctx.strokeStyle = def.color;
        ctx.lineWidth = 2;
        ctx.stroke();
        this.text(banner.actor.name + "  ·  " + def.name, x + w / 2, y + h * .42, this.layout.desktop ? 21 : 16, "#fff2d8", "center", 850);

      });

    drawMergeOverlay() {
      const effects = this.effects.filter(e => e.type === "merge");
      if (!effects.length) return;
      const e = effects[effects.length - 1];
      const t = clamp(e.age / e.duration, 0, 1);
      const d = e.data;
      const ctx = this.ctx;
      const cx = this.layout.field.x + this.layout.field.w / 2;
      const cy = this.layout.handY + (this.layout.desktop ? 38 : 28);
      ctx.save();
      ctx.globalAlpha = Math.sin(t * Math.PI);
      const scale = .72 + Math.sin(t * Math.PI) * .55;
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);
      ctx.shadowColor = d.color;
      ctx.shadowBlur = 20;
      ctx.fillStyle = "rgba(10,14,15,.96)";
      roundRect(ctx, -42, -30, 84, 60, 14);
      ctx.fill();
      ctx.strokeStyle = d.color;
      ctx.lineWidth = 3;
      ctx.stroke();
      this.text(SKILL_DEFS[d.skill].name, 0, -7, 14, "#fff0d1", "center", 800);
      this.text("★".repeat(d.star) + " 合成", 0, 13, 10, "#edbd50", "center", 750);

  class InputController {
    constructor(game, canvas) {
      this.game = game;
      this.canvas = canvas;
      this.down = null;
      this.dragging = false;
      canvas.addEventListener("pointerdown", e => this.onDown(e));
      canvas.addEventListener("pointermove", e => this.onMove(e));
      canvas.addEventListener("pointerup", e => this.onUp(e));
      canvas.addEventListener("pointercancel", e => this.onCancel(e));
      canvas.addEventListener("contextmenu", e => e.preventDefault());
      window.addEventListener("keydown", e => {
        if (this.game.editorOpen) {
          if (e.key === "Escape") this.game.closeTeamEditor();
          e.preventDefault();
          return;
        }
        if (e.code === "Space") {
          e.preventDefault();
          this.game.battle.running ? this.game.battle.pause() : this.game.battle.start();
        }
        if (e.key.toLowerCase() === "n") this.game.battle.stepOnce();
      });
    }
    point(e) {
      const rect = this.canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * CONFIG.WIDTH / rect.width,
        y: (e.clientY - rect.top) * CONFIG.HEIGHT / rect.height
      };
    }
    regionAt(p) {
      for (let i = this.game.hitRegions.length - 1; i >= 0; i--) {
        const r = this.game.hitRegions[i];
        if (p.x >= r.x && p.y >= r.y && p.x <= r.x + r.w && p.y <= r.y + r.h) return r;
      }
      const nearby = this.game.hitRegions.filter(r => {
        if (r.type !== "button" && r.type !== "skill") return false;
        const padX = r.type === "button" ? 4 : 2;
        const padY = 7;
        return p.x >= r.x - padX && p.y >= r.y - padY &&
          p.x <= r.x + r.w + padX && p.y <= r.y + r.h + padY;
      }).sort((a, b) => {
        const ad = Math.pow(p.x - (a.x + a.w / 2), 2) + Math.pow(p.y - (a.y + a.h / 2), 2);
        const bd = Math.pow(p.x - (b.x + b.w / 2), 2) + Math.pow(p.y - (b.y + b.h / 2), 2);
        return ad - bd;
      });
      if (nearby.length) return nearby[0];
      return null;
    }
    onDown(e) {
      const p = this.point(e);
      const region = this.regionAt(p);
      this.down = { p: p, last: p, region: region, pointerId: e.pointerId };
      this.dragging = false;
      try { this.canvas.setPointerCapture(e.pointerId); } catch (_) {}
    }
    onMove(e) {
      if (!this.down || this.down.pointerId !== e.pointerId) return;
      const p = this.point(e);
      const dxTotal = p.x - this.down.p.x;
      const dyTotal = p.y - this.down.p.y;
      if (this.down.region && this.down.region.type === "field" && Math.hypot(dxTotal, dyTotal) > 6) {
        this.dragging = true;
      }
      if (this.dragging) {
        const dx = p.x - this.down.last.x;
        const dy = p.y - this.down.last.y;
        this.game.map.panBy(-dx / CONFIG.CELL, -dy / CONFIG.CELL);
      }
      this.down.last = p;
    }
    onUp(e) {
      if (!this.down || this.down.pointerId !== e.pointerId) return;
      const p = this.point(e);
      const region = this.regionAt(p);
      if (!this.dragging && this.down.region && region && this.down.region.type === region.type && this.down.region.id === region.id) {
        this.activate(region, p);
      }
      this.onCancel(e);
    }
    onCancel(e) {
      if (this.down) {
        try { this.canvas.releasePointerCapture(this.down.pointerId); } catch (_) {}
      }
      this.down = null;
      this.dragging = false;
    }
    activate(region, p) {
      if (region.type === "button") this.game.handleButton(region.id);
      if (region.type === "skill") this.game.handleSkillSlot(region.unitId, region.index);
      if (region.type === "field") {
        const w = this.game.map.screenToWorld(p.x, p.y);
        const unit = this.game.map.unitAt(w.x, w.y, null);
        if (unit && unit.team === "ally") {
          this.game.selectedAllyId = unit.id;
          this.game.swapPick = null;
          this.game.log("查看 " + unit.name + " 的技能顺序", "muted");
        }
      }
      if (region.type === "minimap") {
        const wx = (p.x - region.x) / region.w * CONFIG.MAP_COLS;
        const wy = (p.y - region.y) / region.h * CONFIG.MAP_ROWS;
        this.game.map.centerCameraAt(wx, wy);
      }
    }
  }

  class Game {
    constructor(canvas) {
      this.canvas = canvas;
      this.seed = 20260715;
      this.skillOrders = deepCopy(INITIAL_SKILL_ORDERS);
      this.lineup = {};
      CONFIG.ALLIES.forEach(data => this.lineup[data.id] = true);
      this.protagonistId = "a1";
      this.logs = [];
      this.hitRegions = [];
      this.selectedAllyId = "a1";
      this.lastAllyActor = null;
      this.swapPick = null;
      this.debugOpen = false;
      this.editorOpen = false;
      this.editorDraft = null;
      this.editorSelectedAllyId = "a1";
      this.editorMessage = "";
      this.lastFrame = performance.now();
      this.reset(this.seed);
      this.input = new InputController(this, canvas);
      requestAnimationFrame(t => this.loop(t));
    }
    reset(seed) {
      this.seed = (Number(seed) >>> 0) || 1;
      if (!CONFIG.ALLIES.some(data => data.id === this.protagonistId && this.lineup[data.id])) {
        const fallback = CONFIG.ALLIES.find(data => this.lineup[data.id]) || CONFIG.ALLIES[0];
        this.protagonistId = fallback.id;
        this.lineup[fallback.id] = true;
      }
      CARD_SEQUENCE = 1;
      this.summonSequence = 1;
      this.rng = new SeededRandom(this.seed);
      this.logs = [];
      this.units = [];
      CONFIG.ALLIES.filter(data => this.lineup[data.id]).forEach(data => {
        this.units.push(new Unit(data, "ally", this.skillOrders[data.id] || []));
      });
      CONFIG.ENEMIES.forEach(data => this.units.push(new Unit(data, "enemy", [])));
      this.map = new GridMap(this);
      this.hand = new HandManager(this);
      this.skills = new SkillSystem(this);
      this.ai = new BattleAI(this);
      this.battle = new BattleManager(this);
      this.renderer = this.renderer || new Renderer(this, this.canvas);
      this.renderer.game = this;
      this.renderer.effects = [];
      this.renderer.actionCue = null;
      this.renderer.skillBanners = [];
      this.renderer.cardRects.clear();
      this.map.focusOn(7, 11.5, true);
      if (!this.units.some(u => u.team === "ally" && u.id === this.selectedAllyId)) {
        const firstAlly = this.units.find(u => u.team === "ally");
        this.selectedAllyId = firstAlly ? firstAlly.id : "a1";
      }
      this.lastAllyActor = this.getSelectedAlly();
      this.swapPick = null;
      this.applyPreBattleEffects();
      this.log("四屏原野已生成，种子 " + this.seed, "ai");
      this.log("可拖动战场或点击右侧小地图查看", "muted");
    }
    applyPreBattleEffects() {
      const casters = this.units.filter(unit =>
        unit.alive && unit.team === "ally" && unit.type !== "summon" && unit.skillBar.includes("void_prayer")
      );
      if (!casters.length) return;
      const def = SKILL_DEFS.void_prayer;
      casters.forEach(caster => {
        const card = { skill: "void_prayer", star: 1 };
        const plan = this.skills.findTarget(caster, card);
        if (!plan) return;
        this.skills.cast(caster, card, plan);
        caster.setCooldown("void_prayer", def.cooldownTurns);
        this.log(caster.name + " 在战斗开始前释放「虚空祝祷」", "skill");
      });
    }
    getSelectedAlly() {
      let unit = this.units.find(u => u.id === this.selectedAllyId && u.team === "ally");
      if (!unit) unit = this.units.find(u => u.team === "ally");
      return unit || null;
    }
    getProtagonist() {
      return this.units.find(u => u.team === "ally" && u.id === this.protagonistId) ||
        this.units.find(u => u.team === "ally") || null;
    }
    isProtagonist(unit) {
      return !!unit && unit.team === "ally" && unit.id === this.protagonistId;
    }
    log(text, type) {
      this.logs.push({ time: this.battle ? this.battle.time : 0, text: text, type: type || "muted" });
      if (this.logs.length > 120) this.logs.splice(0, this.logs.length - 120);
    }
    applyDamage(source, target, amount, label) {
      if (!target || !target.alive) return 0;
      let real = amount;
      if (target.vulnerableUntil > this.battle.time) real *= 1 + CONFIG.VULNERABLE_BONUS;
      real = Math.round(real);
      const absorbed = Math.min(target.shield, real);
      target.shield -= absorbed;
      const hpDamage = real - absorbed;
      target.hp = Math.max(0, target.hp - hpDamage);
      this.renderer.addFloat(target.x, target.y, "-" + real, "#e45f6d");
      this.log(target.name + " 受到 " + real + " 点" + label + "伤害", "damage");
      if (target.hp <= 0) {
        target.alive = false;
        target.deathFade = 1;
        target.hand = [];
        target.extraCard = null;
        this.log(target.name + " 被击败", "warn");
      }
      return real;
    }
    applyHeal(source, target, amount, label) {
      if (!target || !target.alive) return 0;
      const actual = Math.min(amount, target.maxHp - target.hp);
      target.hp += actual;
      this.renderer.addFloat(target.x, target.y, "+" + actual, "#4fbf79");
      this.log(target.name + " 恢复 " + actual + " 点生命", "heal");
      return actual;
    }
    openTeamEditor() {
      this.battle.pause();
      this.debugOpen = false;
      this.editorOpen = true;
      this.editorSelectedAllyId = this.selectedAllyId || CONFIG.ALLIES[0].id;
      this.editorDraft = {
        lineup: Object.assign({}, this.lineup),
        skills: deepCopy(this.skillOrders),
        protagonistId: this.protagonistId
      };
      this.editorMessage = "点击角色切换编辑对象；可单独设为主角，只有主角播放完整抽卡过程。";
    }
    closeTeamEditor() {
      this.editorOpen = false;
      this.editorDraft = null;
      this.editorMessage = "";
    }
    toggleEditorLineup(unitId) {
      if (!this.editorDraft || !(unitId in this.editorDraft.lineup)) return;
      const activeCount = CONFIG.ALLIES.filter(data => this.editorDraft.lineup[data.id]).length;
      if (this.editorDraft.lineup[unitId] && this.editorDraft.protagonistId === unitId) {
        this.editorMessage = "主角必须上场，请先把另一名角色设为主角。";
        return;
      }
      if (this.editorDraft.lineup[unitId] && activeCount <= 1) {
        this.editorMessage = "至少需要 1 名角色上场。";
        return;
      }
      this.editorDraft.lineup[unitId] = !this.editorDraft.lineup[unitId];
      this.editorSelectedAllyId = unitId;
      this.editorMessage = this.editorDraft.lineup[unitId] ? "已加入出战队伍。" : "已设为候补。";
    }
    setEditorProtagonist(unitId) {
      if (!this.editorDraft || !CONFIG.ALLIES.some(data => data.id === unitId)) return;
      this.editorDraft.protagonistId = unitId;
      this.editorDraft.lineup[unitId] = true;
      this.editorSelectedAllyId = unitId;
      const data = CONFIG.ALLIES.find(item => item.id === unitId);
      this.editorMessage = "已将 " + data.name + " 设为主角：完整抽卡；其他队友使用联机抽卡提示。";
    }
    toggleEditorSkill(skill) {
      if (!this.editorDraft || !SKILL_DEFS[skill]) return;
      const unitId = this.editorSelectedAllyId;
      const current = (this.editorDraft.skills[unitId] || []).slice();
      const index = current.indexOf(skill);
      if (index >= 0) {
        current.splice(index, 1);
        this.editorMessage = "已卸下「" + SKILL_DEFS[skill].name + "」。角色可以不带满 " + CONFIG.MAX_EQUIPPED_SKILLS + " 个技能。";
      } else {
        if (current.length >= CONFIG.MAX_EQUIPPED_SKILLS) {
          this.editorMessage = "最多装配 " + CONFIG.MAX_EQUIPPED_SKILLS + " 个战技；请先卸下一个技能。";
          return;
        }
        current.push(skill);
        this.editorMessage = "已装配「" + SKILL_DEFS[skill].name + "」，位于释放顺序第 " + current.length + " 位。";
      }
      this.editorDraft.skills[unitId] = current;
    }
    applyTeamEditor() {
      if (!this.editorDraft) return;
      const active = CONFIG.ALLIES.filter(data => this.editorDraft.lineup[data.id]);
      if (!active.length) {
        this.editorMessage = "至少需要 1 名角色上场。";
        return;
      }
      if (!active.some(data => data.id === this.editorDraft.protagonistId)) {
        this.editorDraft.protagonistId = active[0].id;
      }
      this.lineup = Object.assign({}, this.editorDraft.lineup);
      this.protagonistId = this.editorDraft.protagonistId;
      CONFIG.ALLIES.forEach(data => {
        const unique = [];
        (this.editorDraft.skills[data.id] || []).forEach(skill => {
          if (SKILL_DEFS[skill] && !unique.includes(skill)) unique.push(skill);
        });
        this.skillOrders[data.id] = unique.slice(0, CONFIG.MAX_EQUIPPED_SKILLS);
      });
      this.editorOpen = false;
      this.editorDraft = null;
      this.reset(this.seed);
      const protagonist = CONFIG.ALLIES.find(data => data.id === this.protagonistId);
      this.log("配队与技能背包已应用 · " + active.length + " 人上场 · 主角 " + protagonist.name, "ally");
    }
    handleButton(id) {
      if (id === "teamEditor") return this.openTeamEditor();
      if (id === "editorClose") return this.closeTeamEditor();
      if (id === "editorApply") return this.applyTeamEditor();
      if (id.startsWith("editorSelect:")) {
        this.editorSelectedAllyId = id.split(":")[1];
        this.editorMessage = "正在编辑该角色的技能背包。";
        return;
      }
      if (id.startsWith("editorLineup:")) return this.toggleEditorLineup(id.split(":")[1]);
      if (id.startsWith("editorProtagonist:")) return this.setEditorProtagonist(id.split(":")[1]);
      if (id.startsWith("editorSkill:")) return this.toggleEditorSkill(id.split(":")[1]);
      if (id === "editorBlocker") return;
      if (id === "start") this.battle.start();
      if (id === "pause") this.battle.pause();
      if (id === "step") this.battle.stepOnce();
      if (id === "speed1") this.battle.speed = 1;
      if (id === "speed2") this.battle.speed = 2;
      if (id === "speed4") this.battle.speed = 4;
      if (id === "sameSeed") this.reset(this.seed);
      if (id === "newSeed") this.reset((Date.now() ^ Math.floor(performance.now() * 1000)) >>> 0);
      if (id === "toggleDebug") this.debugOpen = !this.debugOpen;
    }
    handleSkillSlot(unitId, index) {
      if (this.battle.running || this.battle.stepping || this.battle.currentActor || this.battle.currentStep) {
        this.log("请先暂停，再调整技能顺序", "warn");
        return;
      }
      const unit = this.units.find(u => u.id === unitId && u.team === "ally");
      if (!unit) return;
      if (!this.swapPick || this.swapPick.unitId !== unitId) {
        this.swapPick = { unitId: unitId, index: index };
        return;
      }
      const first = this.swapPick.index;
      if (first !== index) {
        const tmp = unit.skillBar[first];
        unit.skillBar[first] = unit.skillBar[index];
        unit.skillBar[index] = tmp;
        this.skillOrders[unit.id] = unit.skillBar.slice();
        this.log(unit.name + " 交换技能位 " + (first + 1) + " 与 " + (index + 1), "ai");
      }
      this.swapPick = null;
    }
    assertState() {
      const occupied = new Set();
      this.units.filter(u => u.alive).forEach(u => {
        const k = keyOf(u.x, u.y);
        if (!this.map.inBounds(u.x, u.y) || this.map.isObstacle(u.x, u.y)) {
          console.error("[断言] 单位处于非法格", u);
        }
        if (occupied.has(k)) console.error("[断言] 单位重叠", k);
        occupied.add(k);
        if (u.team === "ally") {
          if (u.hand.length > this.hand.handLimit(u)) console.error("[断言] 普通手牌超过动态上限", u);
          if (u.extraCard && u.hand.includes(u.extraCard)) console.error("[断言] 冷却槽重复引用", u);
          if (u.actionPoints < 0 || u.actionPoints > u.maxActionPoints) console.error("[断言] 行动力越界", u);
          SKILL_KEYS.forEach(skill => {
            if (!Number.isInteger(u.cooldowns[skill]) || u.cooldowns[skill] < 0) console.error("[断言] 回合冷却非法", u, skill);
          });
        }
      });
    }
    loop(now) {
      const dt = Math.min(50, Math.max(0, now - this.lastFrame));
      this.lastFrame = now;
      this.battle.update(dt);
      if (this.battle.currentActor && this.battle.currentActor.team === "ally") {
        this.lastAllyActor = this.battle.currentActor;
      }
      this.map.updateCamera(dt);
      this.renderer.update(dt, this.battle.running || this.battle.stepping);
      this.renderer.render();
      requestAnimationFrame(t => this.loop(t));
    }
  }

  const canvas = document.getElementById("game");
  const game = new Game(canvas);
  window.__WINDSPROUT_GAME__ = game;
  </script>
</body>
