<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#202523">
  <title>风芽远征 · 自动战棋 Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(110,121,110,.24), transparent 34%),
        linear-gradient(145deg, #171c1c 0%, #252a28 52%, #15191b 100%);
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }
    body {
      position: fixed;
      inset: 0;
      display: block;
      min-height: 0;
      padding: 0;
    }
    #game-shell {
      position: absolute;
      top: env(safe-area-inset-top, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      width: auto;
      height: auto;
    }
    canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 0;
      touch-action: none;
      outline: none;
      background: #202523;
    }
    #live {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main id="game-shell">
    <canvas id="game" width="390" height="844" aria-label="风芽远征自动战棋游戏画面" tabindex="0"></canvas>
    <div id="live" aria-live="polite"></div>
  </main>

  <script>
  "use strict";

  /* =========================
     集中配置：玩法与 AI 权重
     ========================= */

    VIEW_ROWS: 13,
    CELL: 38,
    FIELD_X: 62,
    FIELD_Y: 103,
    FIELD_W: 266,
    FIELD_H: 494,
    ACTION_THRESHOLD: 100,
    ACTION_POINTS: 4,
    MOVE_PER_ACTION_POINT: 4,
    ENEMY_MOVE: 2,
    MAX_DRAWS_PER_ACTION: 100,
    HAZARD_DAMAGE: 10,
    BURN_DURATION: 3.5,
    BURN_DAMAGE: 8,
    VULNERABLE_BONUS: 0.25,
    ANIMATION: {
      INTRO: 180,
      DRAW: 560,
      STASH: 720,
      SORT_HAND: 1180,
      MERGE: 1400,
      REMOTE_DRAW: 1100,
      ACTION_START: 900,

      CARD_FLY: 460,
      SKILL_TITLE: 1300,
      WINDUP: 380,
      CAST: 720,
      SETTLE: 560,
      SKIP: 160,
      ATTACK: 560,

    },
    AI_WEIGHTS: {
      CASTABLE_CARD: 18,
      DAMAGE: 0.34,
      HEAL: 0.42,
      AOE_HIT: 9,
      KILL: 32,
      DANGER_TILE: -34,
      ENEMY_THREAT: -12,
      SAFETY_DISTANCE: 1.7,
      APPROACH: 2.8
    },
    COLORS: {
      ink: "#f0eadc",
      muted: "#aeb6af",

    },
    ALLIES: [
      { id: "a1", name: "芽芽", short: "芽", x: 4, y: 15, hp: 108, speed: 18, color: "#55c9ad" },
      { id: "a2", name: "晴羽", short: "羽", x: 5, y: 13, hp: 92, speed: 22, color: "#62b9ee" },
      { id: "a3", name: "露米", short: "露", x: 8, y: 14, hp: 98, speed: 16, color: "#a98ce8" },
      { id: "a4", name: "柚子", short: "柚", x: 10, y: 13, hp: 118, speed: 14, color: "#eac95e" }
    ],
    ENEMIES: [
      { id: "e1", name: "刺团", short: "刺", type: "melee", x: 4, y: 9, hp: 82, speed: 15, attack: 14, range: 1 },
      { id: "e2", name: "钳叶", short: "钳", type: "melee", x: 9, y: 9, hp: 86, speed: 13, attack: 15, range: 1 },
      { id: "e3", name: "莓弓", short: "弓", type: "ranged", x: 5, y: 8, hp: 66, speed: 17, attack: 10, range: 4 },
      { id: "e4", name: "蒲弩", short: "弩", type: "ranged", x: 8, y: 8, hp: 70, speed: 16, attack: 11, range: 4 },
      { id: "e5", name: "赤冠", short: "冠", type: "elite", x: 7, y: 9, hp: 165, speed: 12, attack: 20, range: 1 }
    ]
  };

  const SKILL_DEFS = {
    guard: {
      name: "守护", short: "守", color: "#58c9c2", cooldownTurns: 1,
      shield: [20, 35, 55], splashShield: 16
    },
    pull: {
      name: "牵引", short: "牵", color: "#9b86dc", cooldownTurns: 1, range: 4,
      damage: [8, 13, 20], pull: [1, 2, 3]
    },
    sunder: {
      name: "破甲", short: "破", color: "#e5a15e", cooldownTurns: 1, range: 4,
      damage: [10, 16, 24], duration: [3, 5, 7]
    },
    slash: {
      name: "斩击", short: "斩", color: "#ed727d", cooldownTurns: 0, range: 1,
      damage: [18, 30, 48], splashDamage: 24
    },
    fireball: {
      name: "火球", short: "火", color: "#f28a65", cooldownTurns: 2, range: 4,
      damage: [16, 27, 42]
    },
    heal: {
      name: "治疗", short: "疗", color: "#70c980", cooldownTurns: 2, range: 4,
      heal: [18, 30, 48], splashHeal: 18
    },
    charge: {
      name: "冲锋", short: "冲", color: "#589fe2", cooldownTurns: 2,
      distance: [2, 3, 4], damage: [16, 28, 43]
    },
    rapid: {
      name: "连射", short: "连", color: "#d9ac42", cooldownTurns: 1, range: 5,
      hits: [2, 3, 4], perHit: [7, 9, 12]
    }
  };

  const SKILL_KEYS = Object.keys(SKILL_DEFS);
  const INITIAL_SKILL_ORDERS = {
    a1: ["guard", "slash", "charge", "heal", "pull", "sunder", "fireball", "rapid"],
    a2: ["rapid", "fireball", "sunder", "pull", "charge", "slash", "heal", "guard"],
    a3: ["heal", "guard", "fireball", "pull", "sunder", "rapid", "slash", "charge"],
    a4: ["slash", "charge", "guard", "sunder", "pull", "rapid", "fireball", "heal"]
  };

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const ease = t => 1 - Math.pow(1 - clamp(t, 0, 1), 3);
  const manhattan = (a, b) => Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
  const keyOf = (x, y) => x + "," + y;
  const deepCopy = obj => JSON.parse(JSON.stringify(obj));

  function roundRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, rr);
  }

  class SeededRandom {
    constructor(seed) {
      this.seed = seed >>> 0;
      this.state = this.seed || 0x6d2b79f5;
    }
    next() {
      let t = this.state += 0x6d2b79f5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    int(max) {
      return Math.floor(this.next() * max);
    }
    pick(arr) {
      return arr[this.int(arr.length)];
    }
  }

  let CARD_SEQUENCE = 1;

  class Card {
    constructor(skill, star, inExtra) {
      this.id = CARD_SEQUENCE++;
      this.skill = skill;
      this.star = star || 1;
      this.inExtra = !!inExtra;
    }
  }

  class Unit {
    constructor(data, team, skillOrder) {
      this.id = data.id;
      this.name = data.name;
      this.short = data.short;
      this.team = team;
      this.type = data.type || "ally";
      this.x = data.x;
      this.y = data.y;
      this.renderX = data.x;
      this.renderY = data.y;
      this.maxHp = data.hp;
      this.hp = data.hp;
      this.shield = 0;
      this.speed = data.speed;
      this.gauge = 0;
      this.attack = data.attack || 0;
      this.range = data.range || 1;
      this.color = data.color || (team === "ally" ? CONFIG.COLORS.ally : CONFIG.COLORS.enemy);
      this.alive = true;
      this.deathFade = 1;
      this.vulnerableUntil = 0;
      this.passiveSlots = [null, null, null, null, null];
      this.skillBar = skillOrder ? skillOrder.slice() : [];
      this.cooldowns = {};
      this.cooldownStartedAt = {};
      SKILL_KEYS.forEach(k => this.cooldowns[k] = 0);
      SKILL_KEYS.forEach(k => this.cooldownStartedAt[k] = -1);
      this.hand = [];
      this.extraCard = null;
      this.actionCount = 0;
      this.maxActionPoints = team === "ally" ? CONFIG.ACTION_POINTS : 0;
      this.actionPoints = this.maxActionPoints;
    }
    hpRatio() {
      return this.hp / this.maxHp;
    }
    cooldownLeft(skill) {
      return Math.max(0, Math.ceil(this.cooldowns[skill] || 0));
    }
    isCooling(skill) {
      return this.cooldownLeft(skill) > 0;
    }
    setCooldown(skill, turns) {
      const value = Math.max(0, Math.floor(turns || 0));
      this.cooldowns[skill] = value;
      this.cooldownStartedAt[skill] = value > 0 ? this.actionCount : -1;
    }
    finishOwnTurnCooldowns() {
      SKILL_KEYS.forEach(skill => {
        if (this.cooldowns[skill] > 0 && this.cooldownStartedAt[skill] < this.actionCount) {
          this.cooldowns[skill]--;
          if (this.cooldowns[skill] <= 0) this.cooldownStartedAt[skill] = -1;
        }
      });
    }
  }

  class GridMap {
    constructor(game) {
      this.game = game;
      this.obstacles = new Set([
        "1,2", "1,3", "5,2", "9,2", "12,2",
        "4,5", "5,5", "8,5", "9,5", "6,7",
        "2,8", "3,8", "10,9", "11,9",
        "5,10", "8,10", "2,12", "3,12", "10,12",
        "6,13", "7,13", "11,14", "12,14",
        "1,16", "2,16", "10,17", "11,17", "6,18",
        "3,20", "4,20", "9,20", "10,20", "6,22",
        "1,23", "12,23", "7,24"
      ]);
      this.dangers = new Set([
        "6,4", "7,6", "3,10", "9,11", "5,14", "9,15", "3,18", "12,6",
        "5,21", "9,24", "3,25"
      ]);
      this.burnZones = [];
      this.cameraX = 3.5;
      this.cameraY = 10;
      this.targetCameraX = this.cameraX;
      this.targetCameraY = this.cameraY;
      this.manualCamera = false;
    }
    inBounds(x, y) {
      return x >= 0 && y >= 0 && x < CONFIG.MAP_COLS && y < CONFIG.MAP_ROWS;
    }
    isObstacle(x, y) {
      return this.obstacles.has(keyOf(x, y));
    }
    unitAt(x, y, ignoreUnit) {
      return this.game.units.find(u => u.alive && u !== ignoreUnit && u.x === x && u.y === y) || null;
    }
    isBlocked(x, y, ignoreUnit) {
      return !this.inBounds(x, y) || this.isObstacle(x, y) || !!this.unitAt(x, y, ignoreUnit);
    }
    isDanger(x, y) {
      return this.dangers.has(keyOf(x, y));
    }
    neighbors(x, y) {
      return [
        { x: x, y: y - 1 },
        { x: x - 1, y: y },
        { x: x + 1, y: y },
        { x: x, y: y + 1 }
      ].filter(p => this.inBounds(p.x, p.y));
    }
    reachable(unit, maxSteps) {
      return this.reachableFrom(unit, { x: unit.x, y: unit.y }, maxSteps);
    }
    reachableFrom(unit, start, maxSteps) {
      const startKey = keyOf(start.x, start.y);
      const queue = [{ x: start.x, y: start.y, d: 0, path: [{ x: start.x, y: start.y }] }];
      const seen = new Set([startKey]);
      const result = [];
      while (queue.length) {
        const node = queue.shift();
        result.push(node);
        if (node.d >= maxSteps) continue;
        for (const n of this.neighbors(node.x, node.y)) {
          const k = keyOf(n.x, n.y);
          if (seen.has(k) || this.isBlocked(n.x, n.y, unit)) continue;
          seen.add(k);
          queue.push({ x: n.x, y: n.y, d: node.d + 1, path: node.path.concat([n]) });
        }
      }
      return result;
    }
    distanceToNearestDanger(pos) {
      let best = 999;
      this.dangers.forEach(k => {
        const parts = k.split(",");
        best = Math.min(best, Math.abs(pos.x - +parts[0]) + Math.abs(pos.y - +parts[1]));
      });
      return best;
    }
    purgeBurn(time) {
      this.burnZones = this.burnZones.filter(z => z.expiresAt > time);
    }
    focusOn(x, y, immediate) {
      const tx = clamp(x - (CONFIG.VIEW_COLS - 1) / 2, 0, CONFIG.MAP_COLS - CONFIG.VIEW_COLS);
      const ty = clamp(y - (CONFIG.VIEW_ROWS - 1) / 2, 0, CONFIG.MAP_ROWS - CONFIG.VIEW_ROWS);
      this.targetCameraX = tx;
      this.targetCameraY = ty;
      this.manualCamera = false;
      if (immediate) {
        this.cameraX = tx;
        this.cameraY = ty;
      }
    }
    panBy(dxCells, dyCells) {
      this.manualCamera = true;
      this.cameraX = clamp(this.cameraX + dxCells, 0, CONFIG.MAP_COLS - CONFIG.VIEW_COLS);
      this.cameraY = clamp(this.cameraY + dyCells, 0, CONFIG.MAP_ROWS - CONFIG.VIEW_ROWS);
      this.targetCameraX = this.cameraX;
      this.targetCameraY = this.cameraY;
    }
    centerCameraAt(x, y) {
      this.manualCamera = true;
      this.cameraX = clamp(x - CONFIG.VIEW_COLS / 2, 0, CONFIG.MAP_COLS - CONFIG.VIEW_COLS);
      this.cameraY = clamp(y - CONFIG.VIEW_ROWS / 2, 0, CONFIG.MAP_ROWS - CONFIG.VIEW_ROWS);
      this.targetCameraX = this.cameraX;
      this.targetCameraY = this.cameraY;
    }
    updateCamera(dt) {
      if (this.manualCamera) return;
      const t = 1 - Math.pow(0.004, Math.min(dt, 50) / 1000);
      this.cameraX = lerp(this.cameraX, this.targetCameraX, t);
      this.cameraY = lerp(this.cameraY, this.targetCameraY, t);
      if (Math.abs(this.cameraX - this.targetCameraX) < 0.002) this.cameraX = this.targetCameraX;
      if (Math.abs(this.cameraY - this.targetCameraY) < 0.002) this.cameraY = this.targetCameraY;
    }
    worldToScreen(x, y) {
      return {
        x: CONFIG.FIELD_X + (x - this.cameraX + 0.5) * CONFIG.CELL,
        y: CONFIG.FIELD_Y + (y - this.cameraY + 0.5) * CONFIG.CELL
      };
    }
    screenToWorld(sx, sy) {
      return {
        x: Math.floor(this.cameraX + (sx - CONFIG.FIELD_X) / CONFIG.CELL),
        y: Math.floor(this.cameraY + (sy - CONFIG.FIELD_Y) / CONFIG.CELL)
      };
    }
  }

  class HandManager {
    constructor(game) {
      this.game = game;
    }
    priority(unit, skill) {
      const i = unit.skillBar.indexOf(skill);
      return i < 0 ? 999 : i;
    }
    sortCards(unit, cards) {
      return cards.slice().sort((a, b) =>
        this.priority(unit, a.skill) - this.priority(unit, b.skill) ||
        b.star - a.star ||
        a.id - b.id
      );
    }
    handLimit(unit) {
      return Math.min(5, Math.floor(unit.skillBar.length / 2) + 1);
    }
    stateCards(state) {
      return state.hand.concat(state.extra ? [state.extra] : []);
    }
    cloneState(state) {
      return { hand: state.hand.slice(), extra: state.extra || null };
    }
    applyState(unit, state) {
      const oldCards = unit.hand.concat(unit.extraCard ? [unit.extraCard] : []);
      oldCards.concat(this.stateCards(state)).forEach(c => c.inExtra = false);
      state.hand.forEach(c => c.inExtra = false);
      if (state.extra) state.extra.inExtra = true;
      unit.hand = state.hand.slice();
      unit.extraCard = state.extra || null;
    }
    findMerge(unit, cards) {
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        if (card.star >= 3) continue;
        for (let j = i + 1; j < cards.length; j++) {
          const mate = cards[j];
          if (mate.skill === card.skill && mate.star === card.star) {
            return { pair: [card, mate], firstIndex: i, secondIndex: j };
          }
        }
      }
      return null;
    }
    planAction(unit) {
      let state = { hand: unit.hand.slice(), extra: unit.extraCard || null };
      const operations = [];
      let draws = 0;
      let guard = 0;
      let lockedExtra = null;
      const limit = this.handLimit(unit);
      const drawIntoRightmostSlot = () => {
        if (state.hand.length >= limit || draws >= CONFIG.MAX_DRAWS_PER_ACTION || !unit.skillBar.length) {
          return false;
        }
        const skill = unit.skillBar[this.game.rng.int(unit.skillBar.length)];
        const card = new Card(skill, 1, false);
        const after = this.cloneState(state);
        after.hand.push(card);
        operations.push({
          type: "draw", before: this.cloneState(state), after: this.cloneState(after), card: card
        });
        state = after;
        draws++;
        return true;
      };
      const syncCoolingExtra = () => {
        if (lockedExtra && state.extra === lockedExtra) return false;
        const card = this.sortCards(
          unit,
          this.stateCards(state).filter(item => unit.isCooling(item.skill))
        )[0];
        if (!card || state.extra === card) return false;
        if (!state.extra) {
          const after = {
            hand: state.hand.filter(item => item !== card),
            extra: card
          };
          operations.push({
            type: "stash", before: this.cloneState(state), after: this.cloneState(after), card: card
          });
          state = after;
          return true;
        }
        const index = state.hand.indexOf(card);
        if (index < 0) return false;
        const outgoing = state.extra;
        const after = this.cloneState(state);
        after.hand[index] = outgoing;
        after.extra = card;
        operations.push({
          type: "swapExtra", before: this.cloneState(state), after: this.cloneState(after),
          card: card, outgoing: outgoing
        });
        state = after;
        return true;
      };

      // 上回合遗留的冷却牌若尚未进入保留槽，先用显式动画归位，绝不在首个抽牌帧瞬移。
      syncCoolingExtra();

      // 先按抽取顺序依次填入 1…N 槽；在初次补满前不检查合成，也不改变已有卡牌槽位。
      let initialDraws = 0;
      while (state.hand.length < limit && guard++ < 500 && drawIntoRightmostSlot()) {
        initialDraws++;
        syncCoolingExtra();
      }

      // 初次补牌结束后才显式整理：逻辑队列的排序不再偷偷改变屏幕上的槽位。
      if (initialDraws > 0 && state.hand.length > 1) {
        const after = this.cloneState(state);
        after.hand = this.sortCards(unit, state.hand);
        operations.push({
          type: "sort", before: this.cloneState(state), after: this.cloneState(after),
          cards: this.stateCards(state).slice()
        });
        state = after;
      }

      // 每轮严格执行：检查合成 → 保留较小槽位并左移补空 → 从右侧补一张 → 再检查。
      while (guard++ < 500) {
        const cards = this.stateCards(state);
        const match = this.findMerge(unit, cards);
        if (!match) {
          if (drawIntoRightmostSlot()) {
            syncCoolingExtra();
            continue;
          }
          break;
        }
        const pair = match.pair;
        const merged = new Card(pair[0].skill, pair[0].star + 1, false);
        const mergesIntoExtra = !!state.extra && pair.includes(state.extra);
        let compacted;
        let after;
        if (mergesIntoExtra) {
          compacted = cards.filter(card => !pair.includes(card));
          after = { hand: compacted.slice(0, limit), extra: merged };
        } else {
          compacted = cards.slice();
          compacted[match.firstIndex] = merged;
          compacted.splice(match.secondIndex, 1);
          after = {
            hand: compacted.filter(card => card !== state.extra).slice(0, limit),
            extra: state.extra || null
          };
        }
        operations.push({
          type: "merge", before: this.cloneState(state), after: this.cloneState(after),
          pair: pair.slice(), merged: merged,
          firstIndex: match.firstIndex, secondIndex: match.secondIndex,
          mergesIntoExtra: mergesIntoExtra
        });
        state = after;
        if (mergesIntoExtra) lockedExtra = merged;
        syncCoolingExtra();
        if (drawIntoRightmostSlot()) syncCoolingExtra();
        continue;
      }
      const finalSortedHand = this.sortCards(unit, state.hand);
      if (finalSortedHand.some((card, index) => card !== state.hand[index])) {
        const after = this.cloneState(state);
        after.hand = finalSortedHand;
        operations.push({
          type: "sort", before: this.cloneState(state), after: this.cloneState(after),
          cards: this.stateCards(state).slice()
        });
        state = after;
      }
      if (state.hand.length < limit && draws >= CONFIG.MAX_DRAWS_PER_ACTION) {
        console.warn("[HandManager] 单次行动抽牌达到上限", unit.id);
        this.game.log("抽牌达到 100 张保护上限", "warn");
      }
      // 普通手牌按可见顺序整理；结束冷却的保留牌仍按已装配技能优先级插入行动队列。
      const queue = this.sortCards(unit, this.stateCards(state));
      return {
        operations: operations,
        finalState: this.cloneState(state),
        queue: queue,
        draws: draws,
        handLimit: this.handLimit(unit)
      };
    }
    removeCard(unit, card) {
      unit.hand = unit.hand.filter(c => c !== card);
      if (unit.extraCard === card) unit.extraCard = null;
    }
    normalizeAfterAction(unit) {
      // 冷却牌的保留槽调整必须留到下次行动准备阶段播放动画，这里只维护基本容量不变量。
      unit.hand = unit.hand.filter(card => card !== unit.extraCard).slice(0, this.handLimit(unit));
    }
  }

  class SkillSystem {
    constructor(game) {
      this.game = game;
    }
    alliesOf(unit) {
      return this.game.units.filter(u => u.alive && u.team === unit.team);
    }
    enemiesOf(unit) {
      return this.game.units.filter(u => u.alive && u.team !== unit.team);
    }
    chooseStable(list, scoreFn, descending) {
      if (!list.length) return null;
      return list.slice().sort((a, b) => {
        const d = scoreFn(a) - scoreFn(b);
        if (Math.abs(d) > 0.0001) return descending ? -d : d;
        return a.id.localeCompare(b.id);
      })[0];
    }
    areaCells(center, star) {
      const cells = [{ x: center.x, y: center.y }];
      if (star >= 2) {
        cells.push(
          { x: center.x + 1, y: center.y },
          { x: center.x - 1, y: center.y },
          { x: center.x, y: center.y + 1 },
          { x: center.x, y: center.y - 1 }
        );
      }
      return cells.filter(p => this.game.map.inBounds(p.x, p.y));
    }
    findTarget(actor, card, pos) {
      const def = SKILL_DEFS[card.skill];
      const origin = pos || { x: actor.x, y: actor.y };
      const allies = this.alliesOf(actor);
      const enemies = this.enemiesOf(actor);
      const inRange = (u, r) => manhattan(origin, u) <= r;
      if (card.skill === "guard") {
        return this.chooseStable(allies, u => u.hpRatio(), false);
      }
      if (card.skill === "pull") {
        return this.chooseStable(enemies.filter(u => inRange(u, def.range)), u => manhattan(origin, u), false);
      }
      if (card.skill === "sunder") {
        return this.chooseStable(enemies.filter(u => inRange(u, def.range)), u => u.hpRatio(), true);
      }
      if (card.skill === "slash") {
        return this.chooseStable(enemies.filter(u => inRange(u, 1)), u => u.hpRatio(), false);
      }
      if (card.skill === "fireball") {
        const choices = [];
        for (let y = 0; y < CONFIG.MAP_ROWS; y++) {
          for (let x = 0; x < CONFIG.MAP_COLS; x++) {
            const cell = { x: x, y: y };
            if (manhattan(origin, cell) > def.range) continue;
            const cells = this.areaCells(cell, card.star);
          const targets = enemies.filter(u => cells.some(p => p.x === u.x && p.y === u.y));
            if (targets.length) choices.push({ id: keyOf(x, y), cell: cell, targets: targets });
          }
        }
        if (!choices.length) return null;
        return choices.sort((a, b) =>
          b.targets.length - a.targets.length ||
          a.targets.reduce((s, u) => s + u.hp, 0) - b.targets.reduce((s, u) => s + u.hp, 0) ||
          a.id.localeCompare(b.id)
        )[0];
      }
      if (card.skill === "heal") {
        const hurt = allies.filter(u => inRange(u, def.range) && u.hp < u.maxHp);
        return this.chooseStable(hurt, u => u.hpRatio(), false);
      }
      if (card.skill === "charge") {
        const max = def.distance[card.star - 1];
        const reachable = enemies.map(target => ({
          target: target,
          path: this.chargePath(actor, target, max, origin)
        })).filter(item => {
          const end = item.path[item.path.length - 1];
          return end && manhattan(end, item.target) === 1;
        }).sort((a, b) =>
          manhattan(origin, a.target) - manhattan(origin, b.target) ||
          a.path.length - b.path.length ||
          a.target.id.localeCompare(b.target.id)
        );
        return reachable.length ? reachable[0].target : null;
      }
      if (card.skill === "rapid") {
        return this.chooseStable(enemies.filter(u => inRange(u, def.range)), u => u.hpRatio(), false);
      }
      return null;
    }
    estimate(actor, card, pos) {
      const target = this.findTarget(actor, card, pos);
      if (!target) return { castable: false, damage: 0, heal: 0, aoe: 0, kills: 0 };
      const def = SKILL_DEFS[card.skill];
      let damage = 0;
      let heal = 0;
      let aoe = 0;
      let kills = 0;
      if (card.skill === "guard") {
        heal = Math.min(def.shield[card.star - 1], 80 - Math.min(80, target.shield));
      } else if (card.skill === "pull") {
        damage = def.damage[card.star - 1];
        kills = damage >= target.hp ? 1 : 0;
      } else if (card.skill === "sunder") {
        damage = def.damage[card.star - 1];
        kills = damage >= target.hp ? 1 : 0;
      } else if (card.skill === "slash") {
        damage = def.damage[card.star - 1];
        aoe = card.star === 3 ? this.enemiesOf(actor).filter(u => manhattan(u, target) === 1).length : 0;
        damage += aoe * def.splashDamage;
        kills = damage >= target.hp ? 1 : 0;
      } else if (card.skill === "fireball") {
        aoe = target.targets.length;
        damage = def.damage[card.star - 1] * aoe;
        kills = target.targets.filter(u => def.damage[card.star - 1] >= u.hp).length;
      } else if (card.skill === "heal") {
        heal = Math.min(def.heal[card.star - 1], target.maxHp - target.hp);
      } else if (card.skill === "charge") {
        damage = def.damage[card.star - 1];
        kills = damage >= target.hp ? 1 : 0;
      } else if (card.skill === "rapid") {
        damage = def.hits[card.star - 1] * def.perHit[card.star - 1];
        kills = damage >= target.hp ? 1 : 0;
      }
      return { castable: true, damage: damage, heal: heal, aoe: aoe, kills: kills };
    }
    pullPath(target, actor, steps) {
      const path = [{ x: target.x, y: target.y }];
      let cur = { x: target.x, y: target.y };
      for (let i = 0; i < steps; i++) {
        const options = this.game.map.neighbors(cur.x, cur.y)
          .filter(p => !this.game.map.isBlocked(p.x, p.y, target))
          .filter(p => manhattan(p, actor) < manhattan(cur, actor))
          .sort((a, b) =>
            manhattan(a, actor) - manhattan(b, actor) ||
            a.y - b.y || a.x - b.x
          );
        if (!options.length) break;
        cur = options[0];
        path.push(cur);
      }
      return path;
    }
    chargePath(actor, target, maxSteps, origin) {
      const start = origin || { x: actor.x, y: actor.y };
      const candidates = this.game.map.reachableFrom(actor, start, maxSteps)
        .filter(n => !(n.x === start.x && n.y === start.y) || manhattan(start, target) === 1)
        .sort((a, b) =>
          manhattan(a, target) - manhattan(b, target) ||
          a.d - b.d || a.y - b.y || a.x - b.x
        );
      const best = candidates.find(n => manhattan(n, target) === 1);
      return best ? best.path : [{ x: start.x, y: start.y }];
    }
    impactMoment(skill) {
      return {
        guard: .44,
        pull: .48,
        sunder: .52,
        slash: .42,
        fireball: .60,
        heal: .48,
        charge: .56,
        rapid: .80
      }[skill] || .5;
    }
    playCastEffect(actor, card, target) {
      const def = SKILL_DEFS[card.skill];
      const star = card.star;
      const from = { x: actor.x, y: actor.y };
      if (card.skill === "guard") {
        this.game.renderer.addEffect("shield", {
          x: target.x, y: target.y, color: def.color, star: star
        }, 760);
      }
      if (card.skill === "pull") {
        this.game.renderer.addEffect("chain", {
          from: from, targetUnit: target, color: def.color, star: star
        }, 720);
      }
      if (card.skill === "sunder") {
        this.game.renderer.addEffect("sunder", {
          x: target.x, y: target.y, from: from, color: def.color, star: star
        }, 720);
      }
      if (card.skill === "slash") {
        this.game.renderer.addEffect("slash", {
          x: target.x, y: target.y, color: def.color, star: star
        }, 680);
      }
      if (card.skill === "fireball") {
        this.game.renderer.addEffect("fireball", {
          from: from, to: target.cell, color: def.color, star: star
        }, 760);
      }
      if (card.skill === "heal") {
        this.game.renderer.addEffect("heal", {
          x: target.x, y: target.y, color: def.color, star: star
        }, 780);
      }
      if (card.skill === "charge") {
        const path = this.chargePath(actor, target, def.distance[star - 1]);
        this.game.renderer.addEffect("charge", {
          path: path.map(p => ({ x: p.x, y: p.y })),
          target: { x: target.x, y: target.y }, color: def.color, star: star
        }, 760);
      }
      if (card.skill === "rapid") {
        this.game.renderer.addEffect("rapid", {
          from: from, to: { x: target.x, y: target.y }, color: def.color,
          hits: def.hits[star - 1], star: star
        }, 700);
      }
    }
    playResolveEffect(actor, card, target) {
      if (card.skill !== "fireball") return;
      const def = SKILL_DEFS[card.skill];
      this.game.renderer.addEffect("burst", {
        x: target.cell.x, y: target.cell.y, color: def.color, star: card.star
      }, 520);
    }
    cast(actor, card, target) {
      const def = SKILL_DEFS[card.skill];
      const star = card.star;
      const from = { x: actor.x, y: actor.y };
      const result = { kind: card.skill, target: target, from: from, motion: null, color: def.color };

      if (card.skill === "guard") {
        target.shield += def.shield[star - 1];
        this.game.renderer.addFloat(target.x, target.y, "+" + def.shield[star - 1] + "盾", def.color);
        if (star === 3) {
          this.alliesOf(actor).filter(u => u !== target && manhattan(u, target) === 1).forEach(u => {
            u.shield += def.splashShield;
            this.game.renderer.addFloat(u.x, u.y, "+" + def.splashShield + "盾", def.color);
          });
        }
        this.game.log(actor.name + " 为 " + target.name + " 提供护盾", "skill");
      }

      if (card.skill === "pull") {
        this.game.applyDamage(actor, target, def.damage[star - 1], "牵引");
        if (target.alive) {
          const path = this.pullPath(target, actor, def.pull[star - 1]);
          if (path.length > 1) {
            const old = { x: target.x, y: target.y };
            const end = path[path.length - 1];
            target.x = end.x;
            target.y = end.y;
            target.renderX = old.x;
            target.renderY = old.y;
            result.motion = { unit: target, path: path };
          }
        }
        this.game.log(actor.name + " 牵引 " + target.name, "skill");
      }

      if (card.skill === "sunder") {
        this.game.applyDamage(actor, target, def.damage[star - 1], "破甲");
        if (target.alive) target.vulnerableUntil = this.game.battle.time + def.duration[star - 1];
        this.game.log(actor.name + " 破甲 " + target.name, "skill");
      }

      if (card.skill === "slash") {
        this.game.applyDamage(actor, target, def.damage[star - 1], "斩击");
        if (star === 3) {
          this.enemiesOf(actor).filter(u => u !== target && manhattan(u, target) === 1)
            .forEach(u => this.game.applyDamage(actor, u, def.splashDamage, "旋斩"));
        }
        this.game.log(actor.name + " 斩击 " + target.name, "skill");
      }

      if (card.skill === "fireball") {
        const hitTargets = target.targets.slice();
        hitTargets.forEach(u => this.game.applyDamage(actor, u, def.damage[star - 1], "火球"));
        if (star === 3) {
          this.areaCells(target.cell, 2).forEach(p => {
            const existing = this.game.map.burnZones.find(z => z.x === p.x && z.y === p.y && z.team === actor.team);
            if (existing) existing.expiresAt = this.game.battle.time + CONFIG.BURN_DURATION;
            else this.game.map.burnZones.push({
              x: p.x, y: p.y, team: actor.team,
              expiresAt: this.game.battle.time + CONFIG.BURN_DURATION
            });
          });
        }
        this.game.log(actor.name + " 的火球命中 " + hitTargets.length + " 个目标", "skill");
      }

      if (card.skill === "heal") {
        this.game.applyHeal(actor, target, def.heal[star - 1], "治疗");
        if (star === 3) {
          this.alliesOf(actor).filter(u => u !== target && manhattan(u, target) === 1)
            .forEach(u => this.game.applyHeal(actor, u, def.splashHeal, "愈合余波"));
        }
        this.game.log(actor.name + " 治疗 " + target.name, "skill");
      }

      if (card.skill === "charge") {
        const path = this.chargePath(actor, target, def.distance[star - 1]);
        if (path.length > 1) {
          const old = { x: actor.x, y: actor.y };
          const end = path[path.length - 1];
          actor.x = end.x;
          actor.y = end.y;
          actor.renderX = old.x;
          actor.renderY = old.y;
          result.motion = { unit: actor, path: path };
        }
        if (manhattan(actor, target) === 1) {
          this.game.applyDamage(actor, target, def.damage[star - 1], "冲锋");
        }
        this.game.log(actor.name + " 冲锋 " + target.name, "skill");
      }

      if (card.skill === "rapid") {
        const hits = def.hits[star - 1];
        for (let i = 0; i < hits && target.alive; i++) {
          this.game.applyDamage(actor, target, def.perHit[star - 1], "连射");
        }
        this.game.log(actor.name + " 对 " + target.name + " 连射 " + hits + " 次", "skill");
      }
      return result;
    }
  }

  class BattleAI {
    constructor(game) {
      this.game = game;
    }
    enemyThreatAt(pos, team) {
      let count = 0;
      this.game.units.filter(u => u.alive && u.team !== team).forEach(enemy => {
        const range = enemy.team === "enemy" ? enemy.range : 4;
        if (manhattan(pos, enemy) <= range) count++;
      });
      return count;
    }
    nearestEnemyDistance(pos, team) {
      const enemies = this.game.units.filter(u => u.alive && u.team !== team);
      return enemies.length ? Math.min.apply(null, enemies.map(e => manhattan(pos, e))) : 0;
    }
    scorePosition(unit, queue, node) {
      const W = CONFIG.AI_WEIGHTS;
      let score = 0;
      let castable = 0;
      let damage = 0;
      let heal = 0;
      let aoe = 0;
      let kills = 0;
      const tempCd = Object.assign({}, unit.cooldowns);
      for (const card of queue) {
        if ((tempCd[card.skill] || 0) > 0) continue;
        const est = this.game.skills.estimate(unit, card, node);
        if (!est.castable) continue;
        castable++;
        damage += est.damage;
        heal += est.heal;
        aoe += est.aoe;
        kills += est.kills;
        const cd = SKILL_DEFS[card.skill].cooldownTurns;
        if (cd > 0) tempCd[card.skill] = cd;
      }
      const enemyDist = this.nearestEnemyDistance(node, unit.team);
      const threat = this.enemyThreatAt(node, unit.team);
      score += castable * W.CASTABLE_CARD;
      score += damage * W.DAMAGE;
      score += heal * W.HEAL;
      score += aoe * W.AOE_HIT;
      score += kills * W.KILL;
      score += this.game.map.isDanger(node.x, node.y) ? W.DANGER_TILE : 0;
      score += threat * W.ENEMY_THREAT;
      score += Math.min(enemyDist, 6) * W.SAFETY_DISTANCE;
      score -= enemyDist * W.APPROACH;
      return { score: score, castable: castable, damage: damage, heal: heal, aoe: aoe, kills: kills };
    }
    choosePosition(unit, queue) {
      const nodes = this.game.map.reachable(unit, CONFIG.ACTION_POINTS * CONFIG.MOVE_PER_ACTION_POINT);
      const scored = nodes.map(node => Object.assign(node, this.scorePosition(unit, queue, node)));
      scored.sort((a, b) =>
        b.score - a.score ||
        a.d - b.d ||
        this.game.map.distanceToNearestDanger(b) - this.game.map.distanceToNearestDanger(a)
      );
      const bestScore = scored[0].score;
      const bestDistance = scored.filter(n => Math.abs(n.score - bestScore) < 0.0001)
        .reduce((m, n) => Math.min(m, n.d), 999);
      let tied = scored.filter(n => Math.abs(n.score - bestScore) < 0.0001 && n.d === bestDistance);
      const bestDangerDistance = Math.max.apply(null, tied.map(n => this.game.map.distanceToNearestDanger(n)));
      tied = tied.filter(n => this.game.map.distanceToNearestDanger(n) === bestDangerDistance);
      const chosen = tied.length > 1 ? tied[this.game.rng.int(tied.length)] : tied[0];
      this.game.log(
        unit.name + " 的整手牌 AI 选择 (" + (chosen.x + 1) + "," + (chosen.y + 1) + ")，评分 " + chosen.score.toFixed(1),
        "ai"
      );
      return chosen;
    }
    chooseCastPosition(unit, card, actionPoints) {
      const maxSteps = Math.max(0, actionPoints) * CONFIG.MOVE_PER_ACTION_POINT;
      if (!maxSteps) return null;
      const W = CONFIG.AI_WEIGHTS;
      const candidates = this.game.map.reachable(unit, maxSteps)
        .filter(node => node.d > 0)
        .map(node => {
          const estimate = this.game.skills.estimate(unit, card, node);
          if (!estimate.castable) return null;
          const apCost = Math.ceil(node.d / CONFIG.MOVE_PER_ACTION_POINT);
          const value = estimate.damage * W.DAMAGE + estimate.heal * W.HEAL +
            estimate.aoe * W.AOE_HIT + estimate.kills * W.KILL;
          return Object.assign(node, {
            apCost: apCost,
            value: value,
            danger: this.game.map.isDanger(node.x, node.y) ? 1 : 0,
            safety: this.game.map.distanceToNearestDanger(node)
          });
        })
        .filter(Boolean)
        .sort((a, b) =>
          a.apCost - b.apCost ||
          b.value - a.value ||
          a.danger - b.danger ||
          b.safety - a.safety ||
          a.d - b.d || a.y - b.y || a.x - b.x
        );
      return candidates[0] || null;
    }
    chooseEnemyMove(unit, target) {
      const nodes = this.game.map.reachable(unit, CONFIG.ENEMY_MOVE);
      if (unit.type === "ranged") {
        const ideal = 4;
        return nodes.sort((a, b) => {
          const da = manhattan(a, target);
          const db = manhattan(b, target);
          const sa = (da <= unit.range ? 40 : 0) - Math.abs(da - ideal) * 6 - (this.game.map.isDanger(a.x, a.y) ? 20 : 0);
          const sb = (db <= unit.range ? 40 : 0) - Math.abs(db - ideal) * 6 - (this.game.map.isDanger(b.x, b.y) ? 20 : 0);
          return sb - sa || a.d - b.d || a.y - b.y || a.x - b.x;
        })[0];
      }
      return nodes.sort((a, b) =>
        manhattan(a, target) - manhattan(b, target) ||
        (this.game.map.isDanger(a.x, a.y) ? 1 : 0) - (this.game.map.isDanger(b.x, b.y) ? 1 : 0) ||
        a.d - b.d || a.y - b.y || a.x - b.x
      )[0];
    }
  }

  class BattleManager {
    constructor(game) {
      this.game = game;
      this.reset();
    }
    reset() {
      this.time = 0;
      this.running = false;
      this.speed = 1;
      this.sequence = [];
      this.currentStep = null;
      this.currentActor = null;
      this.stepping = false;
      this.gameOver = false;
      this.result = "";
      this.actionIndex = 0;
    }
    addStep(duration, onStart, onUpdate, onEnd, options) {
      const opts = options || {};
      this.sequence.push({
        duration: Math.max(1, duration || 1),
        elapsed: 0,
        onStart: onStart || null,
        onUpdate: onUpdate || null,
        onEnd: onEnd || null,
        started: false,
        visualBarrier: !!opts.visualBarrier,
        presented: false,
        label: opts.label || ""
      });
    }
    advanceTimeline() {
      const alive = this.game.units.filter(u => u.alive);
      if (!alive.length) return null;
      let delta = Infinity;
      alive.forEach(u => {
        delta = Math.min(delta, Math.max(0, CONFIG.ACTION_THRESHOLD - u.gauge) / u.speed);
      });
      if (!Number.isFinite(delta)) return null;
      this.time += delta;
      alive.forEach(u => u.gauge = Math.min(CONFIG.ACTION_THRESHOLD, u.gauge + u.speed * delta));
      this.game.map.purgeBurn(this.time);
      const ready = alive.filter(u => u.gauge >= CONFIG.ACTION_THRESHOLD - 0.0001)
        .sort((a, b) => b.speed - a.speed || a.id.localeCompare(b.id));
      return ready[0] || null;
    }
    startNextAction() {
      if (this.gameOver || this.currentActor) return;
      const actor = this.advanceTimeline();
      if (!actor) return;
      this.currentActor = actor;
      this.actionIndex++;
      actor.actionCount++;
      if (actor.team === "ally") actor.actionPoints = actor.maxActionPoints;
      this.game.map.focusOn(actor.x, actor.y, false);
      this.game.log(
        "▶ " + actor.name + " 获得行动机会" + (actor.team === "ally" ? " · 行动力 " + actor.actionPoints : ""),
        actor.team === "ally" ? "ally" : "enemy"
      );
      this.addStep(CONFIG.ANIMATION.INTRO);
      if (actor.team === "ally") this.buildAllyAction(actor);
      else this.buildEnemyAction(actor);
    }
    createMoveStep(unit, path, perCell) {
      if (!path || path.length <= 1) return;
      const duration = Math.max(80, (path.length - 1) * perCell);
      this.addStep(duration, step => {
        step.path = path.map(p => ({ x: p.x, y: p.y }));
        const end = step.path[step.path.length - 1];
        unit.x = end.x;
        unit.y = end.y;
        unit.renderX = step.path[0].x;
        unit.renderY = step.path[0].y;
        this.game.map.focusOn(end.x, end.y, false);
      }, (step, t) => {
        const segments = step.path.length - 1;
        const f = clamp(t, 0, 0.999999) * segments;
        const i = Math.min(segments - 1, Math.floor(f));
        const lt = ease(f - i);
        unit.renderX = lerp(step.path[i].x, step.path[i + 1].x, lt);
        unit.renderY = lerp(step.path[i].y, step.path[i + 1].y, lt);
      }, () => {
        unit.renderX = unit.x;
        unit.renderY = unit.y;
      });
    }
    createHandPreparationSteps(actor, operations) {
      const slotOf = (state, card) => {
        if (state.extra === card) return this.game.hand.handLimit(actor);
        return state.hand.indexOf(card);
      };
      const rectOf = (state, card) => {
        const slot = slotOf(state, card);
        if (slot < 0) throw new Error("手牌动画状态缺少卡牌 #" + card.id);
        return this.game.renderer.getHandSlotRect(slot, actor);
      };
      operations.forEach(operation => {
        if (operation.type === "draw") {
          this.addStep(CONFIG.ANIMATION.DRAW, () => {
            this.game.hand.applyState(actor, operation.before);
            this.game.renderer.actionCue = {
              type: "drawCard", actor: actor, card: operation.card,
              targetRect: rectOf(operation.after, operation.card), progress: 0
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(actor.name + " 抽到「" + SKILL_DEFS[operation.card.skill].name + "」", "draw");
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "drawCard" });
        }
        if (operation.type === "stash" || operation.type === "swapExtra") {
          this.addStep(CONFIG.ANIMATION.STASH, () => {
            this.game.hand.applyState(actor, operation.before);
            const beforeCards = this.game.hand.stateCards(operation.before);
            const afterCards = this.game.hand.stateCards(operation.after);
            const shiftCards = afterCards.filter(card =>
              beforeCards.includes(card) && card !== operation.card && card !== operation.outgoing &&
              slotOf(operation.before, card) !== slotOf(operation.after, card)
            ).map(card => ({
              card: card,
              fromRect: rectOf(operation.before, card),
              toRect: rectOf(operation.after, card),
              fromExtra: operation.before.extra === card,
              toExtra: operation.after.extra === card
            }));
            this.game.renderer.actionCue = {
              type: "stashCard", actor: actor, card: operation.card,
              originRect: rectOf(operation.before, operation.card),
              targetRect: rectOf(operation.after, operation.card),
              outgoing: operation.outgoing || null,
              outgoingOriginRect: operation.outgoing ? rectOf(operation.before, operation.outgoing) : null,
              outgoingTargetRect: operation.outgoing ? rectOf(operation.after, operation.outgoing) : null,
              shiftCards: shiftCards, progress: 0
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(
              SKILL_DEFS[operation.card.skill].name + " 冷却中 · " +
              (operation.outgoing ? "替换保留槽中的" + SKILL_DEFS[operation.outgoing.skill].name : "移入保留槽"),
              "cooldown"
            );
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "stashCard" });
        }
        if (operation.type === "sort") {
          this.addStep(CONFIG.ANIMATION.SORT_HAND, () => {
            this.game.hand.applyState(actor, operation.before);
            this.game.renderer.actionCue = {
              type: "sortHand", actor: actor, progress: 0,
              items: operation.cards.map(card => ({
                card: card,
                originRect: rectOf(operation.before, card),
                targetRect: rectOf(operation.after, card),
                fromExtra: operation.before.extra === card,
                toExtra: operation.after.extra === card
              }))
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(actor.name + " 手牌整理完成", "ai");
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "sortHand" });
        }
        if (operation.type === "merge") {
          this.addStep(CONFIG.ANIMATION.MERGE, () => {
            this.game.hand.applyState(actor, operation.before);
            const beforeCards = this.game.hand.stateCards(operation.before);
            const afterCards = this.game.hand.stateCards(operation.after);
            const shiftCards = afterCards.filter(card =>
              beforeCards.includes(card) && !operation.pair.includes(card) &&
              slotOf(operation.before, card) !== slotOf(operation.after, card)
            ).map(card => ({
              card: card,
              fromRect: rectOf(operation.before, card),
              toRect: rectOf(operation.after, card),
              fromExtra: operation.before.extra === card,
              toExtra: operation.after.extra === card
            }));
            this.game.renderer.actionCue = {
              type: "mergeCards", actor: actor, pair: operation.pair,
              merged: operation.merged,
              originRects: operation.pair.map(card => rectOf(operation.before, card)),
              originExtra: operation.pair.map(card => operation.before.extra === card),
              targetRect: rectOf(operation.after, operation.merged),
              targetExtra: operation.after.extra === operation.merged,
              shiftCards: shiftCards,
              progress: 0
            };
          }, (step, t) => {
            if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
          }, () => {
            this.game.hand.applyState(actor, operation.after);
            this.game.log(
              SKILL_DEFS[operation.merged.skill].name + " 合成为 " + operation.merged.star + "★并放回手牌",
              "merge"
            );
            this.game.renderer.actionCue = null;
          }, { visualBarrier: true, label: "mergeCards" });
        }
      });
    }
    createRemoteHandPreparationStep(actor, finalState, cardCount) {
      this.addStep(CONFIG.ANIMATION.REMOTE_DRAW, () => {
        this.game.hand.applyState(actor, finalState);
        // 行动提示出现前把已缓动中的镜头稳稳落到队友身上，避免气泡追着镜头漂移。
        this.game.map.focusOn(actor.x, actor.y, true);
        this.game.renderer.actionCue = {
          type: "remoteDraw", actor: actor, cardCount: cardCount, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue && this.game.renderer.actionCue.type === "remoteDraw") {
          this.game.renderer.actionCue.progress = t;
        }
      }, () => {
        this.game.log(actor.name + " 的远端手牌已同步 · " + cardCount + " 张", "draw");
        if (this.game.renderer.actionCue && this.game.renderer.actionCue.type === "remoteDraw") {
          this.game.renderer.actionCue = null;
        }
      }, { visualBarrier: true, label: "remoteDraw" });
    }
    createActionStartStep(actor, finalState, cardCount) {
      this.addStep(CONFIG.ANIMATION.ACTION_START, () => {
        this.game.hand.applyState(actor, finalState);
        this.game.renderer.actionCue = {
          type: "actionStart", actor: actor, cardCount: cardCount,
          actionPoints: actor.actionPoints, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, () => {
        this.game.log("▶ " + actor.name + " 开始行动", "ally");
        this.game.renderer.actionCue = null;
      }, { visualBarrier: true, label: "actionStart" });
    }
    createRepositionStep(actor, card) {
      this.addStep(1, step => {
        step.path = null;
        step.visualBarrier = false;
        if (!actor.alive || actor.isCooling(card.skill)) return;
        if (this.game.skills.findTarget(actor, card)) return;
        const choice = this.game.ai.chooseCastPosition(actor, card, actor.actionPoints);
        if (!choice) {
          this.game.log(
            SKILL_DEFS[card.skill].name + (actor.actionPoints > 0 ? " 尝试寻路后仍无可施法位置" : " 行动力已耗尽，无法接近目标"),
            "warn"
          );
          return;
        }
        step.path = choice.path.map(p => ({ x: p.x, y: p.y }));
        step.duration = Math.max(100, (step.path.length - 1) * CONFIG.ANIMATION.MOVE_PER_CELL);
        step.visualBarrier = true;
        actor.actionPoints = Math.max(0, actor.actionPoints - choice.apCost);
        const end = step.path[step.path.length - 1];
        actor.x = end.x;
        actor.y = end.y;
        actor.renderX = step.path[0].x;
        actor.renderY = step.path[0].y;
        this.game.map.focusOn(end.x, end.y, false);
        this.game.log(
          actor.name + " 为施放「" + SKILL_DEFS[card.skill].name + "」移动 " + (step.path.length - 1) +
          " 格，消耗 " + choice.apCost + " 行动力（剩余 " + actor.actionPoints + "）",
          "ai"
        );
      }, (step, t) => {
        if (!step.path || step.path.length < 2) return;
        const segments = step.path.length - 1;
        const f = clamp(t, 0, .999999) * segments;
        const i = Math.min(segments - 1, Math.floor(f));
        const lt = ease(f - i);
        actor.renderX = lerp(step.path[i].x, step.path[i + 1].x, lt);
        actor.renderY = lerp(step.path[i].y, step.path[i + 1].y, lt);
      }, step => {
        if (step.path) {
          actor.renderX = actor.x;
          actor.renderY = actor.y;
        }
      }, { label: "reposition" });
    }
    createCardStep(actor, card) {
      const flow = {
        actor: actor,
        card: card,
        valid: false,
        target: null,
        aimCell: null,
        originRect: null,
        result: null,
        resolved: false,
        effectStarted: false,
        impactAt: .5,
        reason: ""
      };
      const cancelRemaining = step => {
        step.duration = 1;
        step.visualBarrier = false;
      };
      const resolveImpact = () => {
        if (!flow.valid || flow.resolved) return;
        flow.resolved = true;
        flow.result = this.game.skills.cast(actor, card, flow.target);
        this.game.skills.playResolveEffect(actor, card, flow.target);
        const cd = SKILL_DEFS[card.skill].cooldownTurns;
        actor.setCooldown(card.skill, cd);
        if (this.game.renderer.actionCue && this.game.renderer.actionCue.type === "impact") {
          this.game.renderer.actionCue.result = flow.result;
        }
      };

      this.addStep(CONFIG.ANIMATION.CARD_FLY, step => {
        if (!actor.alive) {
          this.game.hand.removeCard(actor, card);
          flow.reason = "施法者已离场";
          cancelRemaining(step);
          return;
        }
        if (actor.isCooling(card.skill)) {
          const left = actor.cooldownLeft(card.skill);
          this.game.log(SKILL_DEFS[card.skill].name + " 冷却中，保留 · 剩余 " + left + " 个自身回合", "cooldown");
          flow.reason = "冷却 " + left + " 回合";
          this.game.renderer.actionCue = {
            type: "skip", actor: actor, card: card, progress: 0, reason: flow.reason
          };
          step.duration = CONFIG.ANIMATION.SKIP;
          return;
        }
        const target = this.game.skills.findTarget(actor, card);
        if (!target) {
          this.game.hand.removeCard(actor, card);
          this.game.log(SKILL_DEFS[card.skill].name + " 已尝试移动，仍没有合法目标，弃置", "warn");
          flow.reason = "移动后仍无目标";
          this.game.renderer.actionCue = {
            type: "skip", actor: actor, card: card, progress: 0, reason: flow.reason
          };
          step.duration = CONFIG.ANIMATION.SKIP;
          return;
        }
        flow.valid = true;
        flow.target = target;
        flow.aimCell = target.cell ? { x: target.cell.x, y: target.cell.y } : { x: target.x, y: target.y };
        flow.originRect = this.game.isProtagonist(actor)
          ? this.game.renderer.getCardRect(card.id)
          : this.game.renderer.getRemoteCardOrigin(actor);
        this.game.hand.removeCard(actor, card);
        this.game.renderer.actionCue = {
          type: "cardFly", actor: actor, card: card, target: target,
          aimCell: flow.aimCell, originRect: flow.originRect, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, () => {
        if (!flow.valid) this.game.renderer.actionCue = null;
      }, { visualBarrier: true, label: "cardFly" });

      this.addStep(CONFIG.ANIMATION.WINDUP, step => {
        if (!flow.valid) return cancelRemaining(step);
        this.game.renderer.showSkillBanner(actor, card);
        this.game.renderer.actionCue = {
          type: "windup", actor: actor, card: card, target: flow.target,
          aimCell: flow.aimCell, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, null, { visualBarrier: true, label: "windup" });

      this.addStep(CONFIG.ANIMATION.CAST, step => {
        if (!flow.valid) return cancelRemaining(step);
        flow.impactAt = this.game.skills.impactMoment(card.skill);
        if (!flow.effectStarted) {
          flow.effectStarted = true;
          this.game.skills.playCastEffect(actor, card, flow.target);
        }
        this.game.renderer.actionCue = {
          type: "impact", actor: actor, card: card, target: flow.target,
          aimCell: flow.aimCell, result: flow.result, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
        if (t >= flow.impactAt) resolveImpact();
        const motion = flow.result && flow.result.motion;
        if (!motion || !motion.path || motion.path.length < 2) return;
        const segments = motion.path.length - 1;
        const motionT = clamp((t - flow.impactAt) / Math.max(.001, 1 - flow.impactAt), 0, 0.999999);
        const f = motionT * segments;
        const i = Math.min(segments - 1, Math.floor(f));
        const lt = ease(f - i);
        motion.unit.renderX = lerp(motion.path[i].x, motion.path[i + 1].x, lt);
        motion.unit.renderY = lerp(motion.path[i].y, motion.path[i + 1].y, lt);
      }, () => {
        resolveImpact();
        const motion = flow.result && flow.result.motion;
        if (motion) {
          motion.unit.renderX = motion.unit.x;
          motion.unit.renderY = motion.unit.y;
        }
      }, { visualBarrier: true, label: "impact" });

      this.addStep(CONFIG.ANIMATION.SETTLE, step => {
        if (!flow.valid) return cancelRemaining(step);
        this.game.renderer.actionCue = {
          type: "settle", actor: actor, card: card, target: flow.target,
          aimCell: flow.aimCell, progress: 0
        };
      }, (step, t) => {
        if (this.game.renderer.actionCue) this.game.renderer.actionCue.progress = t;
      }, () => {
        this.game.renderer.actionCue = null;
      }, { visualBarrier: true, label: "settle" });
    }
    buildAllyAction(actor) {
      const prep = this.game.hand.planAction(actor);
      this.game.log(
        actor.name + " 已装配 " + actor.skillBar.length + " 个技能 · 普通手牌上限 " + prep.handLimit,
        "muted"
      );
      if (this.game.isProtagonist(actor)) {
        this.createHandPreparationSteps(actor, prep.operations);
      } else {
        this.createRemoteHandPreparationStep(actor, prep.finalState, prep.queue.length);
      }
      this.createActionStartStep(actor, prep.finalState, prep.queue.length);
      prep.queue.forEach(card => {
        this.createRepositionStep(actor, card);
        this.createCardStep(actor, card);
      });
      this.addEndTileStep(actor);
    }
    nearestTarget(unit) {
      const targets = this.game.units.filter(u => u.alive && u.team !== unit.team);
      return targets.sort((a, b) => manhattan(unit, a) - manhattan(unit, b) || a.id.localeCompare(b.id))[0] || null;
    }
    buildEnemyAction(actor) {
      const target = this.nearestTarget(actor);
      if (!target) {
        this.addStep(80);
        return;
      }
      const move = this.game.ai.chooseEnemyMove(actor, target);
      this.game.log(actor.name + " 向 " + target.name + " 移动", "enemy");
      this.createMoveStep(actor, move.path, CONFIG.ANIMATION.MOVE_PER_CELL);
      this.addStep(CONFIG.ANIMATION.ATTACK, step => {
        if (!actor.alive) return;
        const newTarget = this.nearestTarget(actor);
        if (!newTarget || manhattan(actor, newTarget) > actor.range) {
          this.game.log(actor.name + " 未进入攻击范围", "muted");
          return;
        }
        this.game.applyDamage(actor, newTarget, actor.attack, actor.type === "ranged" ? "远射" : "攻击");
        if (actor.type === "ranged") {
          this.game.renderer.addEffect("projectile", {
            from: { x: actor.x, y: actor.y },
            to: { x: newTarget.x, y: newTarget.y },
            color: "#ef8b92",
            shape: "thorn"
          }, 340);
        } else {
          this.game.renderer.addEffect("slash", { x: newTarget.x, y: newTarget.y, color: "#ef7580" }, 300);
        }
        this.game.log(actor.name + " 攻击 " + newTarget.name, "enemy");
      });
      this.addEndTileStep(actor);
    }
    addEndTileStep(actor) {
      this.addStep(CONFIG.ANIMATION.END_TILE, () => {
        if (!actor.alive) return;
        if (this.game.map.isDanger(actor.x, actor.y)) {
          this.game.applyDamage(null, actor, CONFIG.HAZARD_DAMAGE, "危险格");
        }
        const burn = this.game.map.burnZones.find(z =>
          z.x === actor.x && z.y === actor.y && z.team !== actor.team && z.expiresAt > this.time
        );
        if (burn && actor.alive) {
          this.game.applyDamage(null, actor, CONFIG.BURN_DAMAGE, "燃烧");
        }
      });
    }
    finishAction() {
      const actor = this.currentActor;
      if (!actor) return;
      actor.gauge = 0;
      if (actor.team === "ally") {
        actor.finishOwnTurnCooldowns();
        this.game.hand.normalizeAfterAction(actor);
      }
      this.currentActor = null;
      this.game.assertState();
      this.checkVictory();
      if (this.stepping) this.stepping = false;
    }
    checkVictory() {
      const alliesAlive = this.game.units.some(u => u.alive && u.team === "ally");
      const enemiesAlive = this.game.units.some(u => u.alive && u.team === "enemy");
      if (alliesAlive && enemiesAlive) return false;
      this.gameOver = true;
      this.running = false;
      this.stepping = false;
      this.result = enemiesAlive ? "战斗失败" : "战斗胜利";
      this.game.log("✦ " + this.result, enemiesAlive ? "warn" : "victory");
      document.getElementById("live").textContent = this.result;
      return true;
    }
    update(dt) {
      if (this.gameOver) return;
      const active = this.running || this.stepping;
      if (!active) return;
      let budget = Math.min(dt, 50) * this.speed;
      let safety = 0;
      while (safety++ < 50) {
        if (!this.currentStep) {
          if (this.sequence.length) {
            this.currentStep = this.sequence.shift();
            this.currentStep.elapsed = 0;
            this.currentStep.started = true;
            if (this.currentStep.onStart) this.currentStep.onStart(this.currentStep);
          } else if (this.currentActor) {
            this.finishAction();
            if (!this.running && !this.stepping) return;
            continue;
          } else {
            if (!this.running && !this.stepping) return;
            this.startNextAction();
            if (!this.currentActor) return;
            continue;
          }
        }
        const step = this.currentStep;
        if (step.visualBarrier && !step.presented) {
          step.presented = true;
          if (step.onUpdate) step.onUpdate(step, 0);
          return;
        }
        const remaining = step.duration - step.elapsed;
        const advance = Math.min(Math.max(0, budget), remaining);
        step.elapsed += advance;
        budget -= advance;
        if (step.onUpdate) step.onUpdate(step, clamp(step.elapsed / step.duration, 0, 1));
        if (step.elapsed >= step.duration - 0.001) {
          if (step.onEnd) step.onEnd(step);
          this.currentStep = null;
          if (step.visualBarrier) return;
          if (budget <= 0) return;
          continue;
        }
        return;
      }
    }
    start() {
      if (this.gameOver) return;
      this.running = true;
      this.stepping = false;
    }
    pause() {
      this.running = false;
      this.stepping = false;
    }
    stepOnce() {
      if (this.gameOver) return;
      this.running = false;
      this.stepping = true;
    }
  }

  class Renderer {
    constructor(game, canvas) {
      this.game = game;
      this.canvas = canvas;
      this.ctx = canvas.getContext("2d");
      this.dpr = 1;
      this.pixelScale = 1;
      this.clock = 0;
      this.effects = [];
      this.actionCue = null;
      this.skillBanners = [];
      this.cardRects = new Map();
      this.layout = null;
      this.resize();
      window.addEventListener("resize", () => this.resize());
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", () => this.resize());
      }
    }
    resize() {
      this.dpr = Math.min(window.devicePixelRatio || 1, 3);
      const rect = this.canvas.getBoundingClientRect();
      const cssWidth = Math.max(320, Math.round(rect.width || window.innerWidth || 390));
      const cssHeight = Math.max(560, Math.round(rect.height || window.innerHeight || 844));
      CONFIG.WIDTH = cssWidth;
      CONFIG.HEIGHT = cssHeight;
      this.layout = this.createLayout(cssWidth, cssHeight);
      CONFIG.CELL = this.layout.cell;
      CONFIG.FIELD_X = this.layout.field.x;
      CONFIG.FIELD_Y = this.layout.field.y;
      CONFIG.FIELD_W = this.layout.field.w;
      CONFIG.FIELD_H = this.layout.field.h;
      this.pixelScale = this.dpr;
      this.canvas.width = Math.max(1, Math.round(cssWidth * this.dpr));
      this.canvas.height = Math.max(1, Math.round(cssHeight * this.dpr));
      this.ctx.setTransform(this.pixelScale, 0, 0, this.pixelScale, 0, 0);
      this.ctx.imageSmoothingEnabled = true;
    }
    createLayout(width, height) {
      const desktop = width >= 900 && width / height >= 1.08;
      if (desktop) {
        const sideW = clamp(Math.floor(width * .245), 280, 390);
        const centerW = width - sideW * 2 - 44;
        const cell = clamp(Math.floor(Math.min((height - 40) / CONFIG.VIEW_ROWS, (centerW - 18) / CONFIG.VIEW_COLS)), 40, 84);
        const fieldW = cell * 7;
        const fieldH = cell * CONFIG.VIEW_ROWS;
        const fieldX = Math.round((width - fieldW) / 2);
        const fieldY = Math.max(18, Math.round((height - fieldH) / 2));
        return {
          desktop: true,
          cell: cell,
          field: { x: fieldX, y: fieldY, w: fieldW, h: fieldH },
          left: { x: 18, y: 18, w: sideW - 34, h: height - 36 },
          right: { x: width - sideW + 16, y: 18, w: sideW - 34, h: height - 36 },
          handY: fieldY + fieldH - 122,
          quickY: fieldY + fieldH - 42
        };
      }
      const fieldY = 56;
      const cell = clamp(Math.floor(Math.min((width - 12) / CONFIG.VIEW_COLS, (height - 194) / CONFIG.VIEW_ROWS)), 28, 56);
      const fieldW = cell * 7;
      const fieldH = cell * CONFIG.VIEW_ROWS;
      return {
        desktop: false,
        cell: cell,
        field: { x: Math.round((width - fieldW) / 2), y: fieldY, w: fieldW, h: fieldH },
        handY: Math.min(height - 168, fieldY + fieldH - 98),
        quickY: height - 54,

      if (this.actionCue && this.actionCue.type === "stashCard") {
        hidden.add(this.actionCue.card.id);
        if (this.actionCue.outgoing) hidden.add(this.actionCue.outgoing.id);
        (this.actionCue.shiftCards || []).forEach(item => hidden.add(item.card.id));
      }
      if (this.actionCue && this.actionCue.type === "sortHand") {

      this.text(title, cx, boxY + boxH * .34, this.layout.desktop ? 28 : 21, b.gameOver && b.result === "战斗失败" ? "#ef7d82" : "#68c6a7", "center", 850);

      ctx.restore();
